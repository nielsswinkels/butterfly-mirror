<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fjärilsskogen - AR Butterfly Mirror</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  #mainCanvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  video { display: none; }
  canvas.offscreen { display: none; }
  #fullscreenBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 100;
    background: rgba(100, 50, 150, 0.7);
    color: #fff;
    border: 2px solid rgba(255, 255, 255, 0.4);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: background 0.3s;
  }
  #fullscreenBtn:hover, #scanBtn:hover { background: rgba(140, 70, 200, 0.9); cursor: pointer; }
  #scanBtn {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 100;
    background: rgba(100, 50, 150, 0.7);
    color: #fff;
    border: 2px solid rgba(255, 255, 255, 0.4);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: background 0.3s;
  }
  #scanOverlay {
    display: none;
    position: fixed; inset: 0;
    z-index: 150;
    background: rgba(0,0,0,0.85);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  #scanOverlay.active { display: flex; }
  #scanCanvas {
    max-width: 90vw;
    max-height: 70vh;
    border: 3px solid rgba(180,100,255,0.6);
    border-radius: 12px;
  }
  #scanOverlay .scan-msg {
    color: #d4a0ff;
    font-size: 22px;
    text-align: center;
  }
  #scanOverlay .scan-buttons {
    display: flex;
    gap: 15px;
  }
  #scanOverlay button {
    background: rgba(100, 50, 150, 0.8);
    color: #fff;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 12px;
    padding: 12px 28px;
    font-size: 18px;
    cursor: pointer;
    transition: background 0.3s;
  }
  #scanOverlay button:hover { background: rgba(140,70,200,0.9); }
  #scanOverlay button.cancel { background: rgba(100,50,50,0.7); }
  #scanOverlay button.cancel:hover { background: rgba(160,60,60,0.9); }
  #scanPreview {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 15px;
  }
  #scanPreview.active { display: flex; }
  #previewCanvas {
    width: 200px;
    height: 200px;
  }
  #loading {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #1a0a2e; z-index: 200;
    color: #d4a0ff; font-size: 24px; gap: 20px;
  }
  .spinner {
    width: 60px; height: 60px;
    border: 4px solid rgba(180,100,255,0.3);
    border-top-color: #b060ff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div>Laddar Fjärilsskogen...</div>
</div>


<button id="scanBtn">SCAN</button>
<button id="fullscreenBtn" onclick="document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()">&#x26F6; Fullskärm</button>

<div id="scanOverlay">
  <div class="scan-msg" id="scanMsg">Håll upp din fjärilsteckning framför kameran</div>
  <canvas id="scanCanvas"></canvas>
  <div class="scan-buttons" id="scanButtons">
    <button id="captureBtn">Fånga!</button>
    <button class="cancel" id="scanCancelBtn">Avbryt</button>
  </div>
  <div id="scanPreview">
    <canvas id="previewCanvas"></canvas>
    <div class="scan-msg" id="previewMsg">Din fjäril!</div>
    <div class="scan-buttons" id="previewButtons">
      <button id="confirmBtn">Släpp fri i skogen!</button>
      <button class="cancel" id="rescanBtn">Skanna igen</button>
    </div>
  </div>
</div>

<canvas id="mainCanvas"></canvas>
<video id="webcam" playsinline autoplay muted></video>

<!-- Offscreen canvases for compositing -->
<canvas id="maskCanvas" class="offscreen"></canvas>
<canvas id="personCanvas" class="offscreen"></canvas>

<script type="module">
const { PoseLandmarker, FilesetResolver } = await import(
  'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/+esm'
);

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const video = document.getElementById('webcam');
const loadingEl = document.getElementById('loading');

// Offscreen canvases for person cutout compositing
const maskCanvas = document.getElementById('maskCanvas');
const maskCtx = maskCanvas.getContext('2d');
const personCanvas = document.getElementById('personCanvas');
const personCtx = personCanvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Hide fullscreen button when already in fullscreen
const fullscreenBtn = document.getElementById('fullscreenBtn');
document.addEventListener('fullscreenchange', () => {
  fullscreenBtn.style.display = document.fullscreenElement ? 'none' : '';
});

// ═══════════════════════════════════════════════════════════════════
// WING PALETTES — one per detected person
// ═══════════════════════════════════════════════════════════════════
const wingPalettes = [
  { pri:'#ff6ec7', sec:'#a855f7', acc:'#fbbf24', glow:'rgba(255,110,199,0.35)' },
  { pri:'#60a5fa', sec:'#34d399', acc:'#fcd34d', glow:'rgba(96,165,250,0.35)'  },
  { pri:'#f97316', sec:'#ef4444', acc:'#fde68a', glow:'rgba(249,115,22,0.35)'  },
  { pri:'#a78bfa', sec:'#ec4899', acc:'#bef264', glow:'rgba(167,139,250,0.35)' },
  { pri:'#2dd4bf', sec:'#3b82f6', acc:'#f9a8d4', glow:'rgba(45,212,191,0.35)'  },
  { pri:'#fbbf24', sec:'#f472b6', acc:'#86efac', glow:'rgba(251,191,36,0.35)'  },
  { pri:'#fb7185', sec:'#c084fc', acc:'#67e8f9', glow:'rgba(251,113,133,0.35)' },
  { pri:'#4ade80', sec:'#facc15', acc:'#f0abfc', glow:'rgba(74,222,128,0.35)'  },
];

// ═══════════════════════════════════════════════════════════════════
// MAGICAL FOREST BACKGROUND (entirely code-drawn)
// ═══════════════════════════════════════════════════════════════════
const trees = [], bgParticles = [], orbs = [], mushrooms = [];

(function initForest() {
  // Pre-compute branch data for each tree
  function makeBranches(h, tw) {
    const count = 2 + Math.floor(h * 4);
    const branches = [];
    for (let b = 0; b < count; b++) {
      branches.push({
        yFrac: 0.4 + b * 0.15,
        side: b % 2 === 0 ? 1 : -1,
        lenMul: 3 + Math.random() * 4,
        widthMul: 0.3 * (1 - b * 0.15),
      });
    }
    return branches;
  }
  // Background trees (further away, smaller)
  for (let i = 0; i < 8; i++) { const h = 0.25+Math.random()*0.25; trees.push({
    x: i/8 + (Math.random()-0.5)*0.1, h,
    tw: 0.008 + Math.random()*0.012, layer: 0,
    hue: 100 + Math.random()*60, gp: Math.random()*6.28, gs: 0.3+Math.random()*0.4,
    branches: makeBranches(h, 0.01),
  });}
  // Foreground trees (closer, bigger, spread across width)
  for (let i = 0; i < 10; i++) { const h = 0.4+Math.random()*0.45; trees.push({
    x: i/10 + (Math.random()-0.5)*0.08, h,
    tw: 0.015 + Math.random()*0.025, layer: 1,
    hue: 80 + Math.random()*80, gp: Math.random()*6.28, gs: 0.2+Math.random()*0.5,
    branches: makeBranches(h, 0.02),
  });}
  // Sort so back-layer draws first
  trees.sort((a,b) => a.layer - b.layer);

  for (let i = 0; i < 70; i++) bgParticles.push({
    x:Math.random(), y:Math.random(), sz:1+Math.random()*3,
    sp:0.0002+Math.random()*0.0006, dr:Math.random()*6.28,
    hue:30+Math.random()*220, a:0.3+Math.random()*0.7, ph:Math.random()*6.28
  });
  for (let i = 0; i < 10; i++) orbs.push({
    x:Math.random(), y:0.25+Math.random()*0.65, r:10+Math.random()*25,
    dx:(Math.random()-0.5)*0.0004, dy:(Math.random()-0.5)*0.0003,
    hue:Math.random()*360, ph:Math.random()*6.28
  });
  // Glowing mushrooms on the ground
  for (let i = 0; i < 12; i++) mushrooms.push({
    x: Math.random(), y: 0.88 + Math.random()*0.1,
    sz: 0.01 + Math.random()*0.015,
    hue: Math.random() < 0.5 ? 280+Math.random()*40 : 160+Math.random()*40,
    ph: Math.random()*6.28
  });
})();

function drawTree(tx, bY, tH, tw, hue, gi, W, H, branches) {
  // ── Trunk with bark texture ──
  const trunkGrad = ctx.createLinearGradient(tx-tw, bY, tx+tw, bY);
  trunkGrad.addColorStop(0, '#1e0e06');
  trunkGrad.addColorStop(0.3, '#3d2010');
  trunkGrad.addColorStop(0.7, '#4a2814');
  trunkGrad.addColorStop(1, '#1e0e06');
  ctx.fillStyle = trunkGrad;
  ctx.beginPath();
  // Slightly curved trunk with gentle root flare at base
  const rootW = tw * 1.6;
  ctx.moveTo(tx - rootW, bY);
  ctx.quadraticCurveTo(tx - tw*1.1, bY - tH*0.03, tx - tw, bY - tH*0.05);
  ctx.quadraticCurveTo(tx - tw*1.2, bY - tH*0.5, tx - tw*0.5, bY - tH);
  ctx.lineTo(tx + tw*0.5, bY - tH);
  ctx.quadraticCurveTo(tx + tw*1.2, bY - tH*0.5, tx + tw, bY - tH*0.05);
  ctx.quadraticCurveTo(tx + tw*1.1, bY - tH*0.03, tx + rootW, bY);
  ctx.fill();

  // Moss mound at trunk base
  const mossW = rootW * 2;
  const mossH = tH * 0.03 + 4;
  ctx.fillStyle = `hsla(${hue-10}, 40%, 18%, 0.7)`;
  ctx.beginPath();
  ctx.ellipse(tx, bY, mossW, mossH, 0, Math.PI, 0);
  ctx.fill();
  // Brighter moss highlight
  ctx.fillStyle = `hsla(${hue}, 45%, 25%, 0.5)`;
  ctx.beginPath();
  ctx.ellipse(tx, bY + 1, mossW * 0.7, mossH * 0.6, 0, Math.PI, 0);
  ctx.fill();

  // ── Branches (pre-computed, stable) ──
  ctx.strokeStyle = '#3a2010';
  ctx.lineCap = 'round';
  for (const br of branches) {
    const by = bY - tH * br.yFrac;
    const bLen = tw * br.lenMul;
    ctx.lineWidth = tw * br.widthMul;
    ctx.beginPath();
    ctx.moveTo(tx, by);
    ctx.quadraticCurveTo(tx + br.side*bLen*0.5, by - tH*0.05, tx + br.side*bLen, by - tH*0.08);
    ctx.stroke();
  }

  // ── Canopy: multiple overlapping leaf clusters ──
  const canopyTop = bY - tH;
  const canopyW = tw * 12;
  const canopyH = tH * 0.55;

  // Main canopy mass — several overlapping ellipses
  const clusters = [
    { dx: 0, dy: 0, rx: canopyW*0.5, ry: canopyH*0.45 },
    { dx: -canopyW*0.25, dy: canopyH*0.05, rx: canopyW*0.38, ry: canopyH*0.38 },
    { dx: canopyW*0.25, dy: canopyH*0.05, rx: canopyW*0.38, ry: canopyH*0.38 },
    { dx: -canopyW*0.1, dy: -canopyH*0.2, rx: canopyW*0.3, ry: canopyH*0.3 },
    { dx: canopyW*0.1, dy: -canopyH*0.2, rx: canopyW*0.3, ry: canopyH*0.3 },
    { dx: 0, dy: canopyH*0.15, rx: canopyW*0.45, ry: canopyH*0.3 },
  ];

  for (const cl of clusters) {
    const cx = tx + cl.dx, cy = canopyTop + cl.dy;
    // Dark base layer
    const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(cl.rx, cl.ry));
    cg.addColorStop(0, `hsla(${hue}, 50%, 22%, ${gi+0.4})`);
    cg.addColorStop(0.5, `hsla(${hue+10}, 45%, 16%, ${gi+0.25})`);
    cg.addColorStop(1, `hsla(${hue}, 40%, 10%, 0)`);
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.ellipse(cx, cy, cl.rx, cl.ry, 0, 0, 6.28);
    ctx.fill();
  }

  // Brighter glow layer on top for magical feel
  const glowGrad = ctx.createRadialGradient(tx, canopyTop, 0, tx, canopyTop, canopyW*0.5);
  glowGrad.addColorStop(0, `hsla(${hue+20}, 70%, 55%, ${gi*0.5})`);
  glowGrad.addColorStop(0.4, `hsla(${hue+10}, 60%, 40%, ${gi*0.3})`);
  glowGrad.addColorStop(1, `hsla(${hue}, 50%, 25%, 0)`);
  ctx.fillStyle = glowGrad;
  ctx.beginPath();
  ctx.ellipse(tx, canopyTop, canopyW*0.5, canopyH*0.45, 0, 0, 6.28);
  ctx.fill();

  // Leaf edge highlights — small bright spots around canopy perimeter
  for (let l = 0; l < 14; l++) {
    const angle = (l / 14) * 6.28 + gi * 0.5;
    const lr = canopyW * 0.4 + Math.sin(angle*3)*canopyW*0.08;
    const lx = tx + Math.cos(angle) * lr;
    const ly = canopyTop + Math.sin(angle) * canopyH * 0.35;
    const leafR = canopyW * 0.08 + Math.sin(angle*5+gi)*canopyW*0.03;
    ctx.fillStyle = `hsla(${hue + Math.sin(angle)*20}, 55%, 35%, ${0.3+gi*0.2})`;
    ctx.beginPath();
    ctx.arc(lx, ly, leafR, 0, 6.28);
    ctx.fill();
  }
}

function drawForest(t) {
  const W = canvas.width, H = canvas.height;

  // sky gradient — deep night forest
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#040214');
  sky.addColorStop(0.2,'#0e0628');
  sky.addColorStop(0.45,'#091a10');
  sky.addColorStop(0.7,'#071408');
  sky.addColorStop(1,'#050e05');
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);

  // Stars in the sky
  for (let i = 0; i < 30; i++) {
    const sx = (Math.sin(i*127.1) * 0.5 + 0.5) * W;
    const sy = (Math.sin(i*311.7) * 0.5 + 0.5) * H * 0.3;
    const fl = 0.3 + 0.7 * Math.abs(Math.sin(t*0.8 + i*2.3));
    ctx.fillStyle = `rgba(200,220,255,${fl*0.6})`;
    ctx.beginPath(); ctx.arc(sx, sy, 1+fl, 0, 6.28); ctx.fill();
  }

  // Ground — mossy forest floor
  const gnd = ctx.createLinearGradient(0, H*0.78, 0, H);
  gnd.addColorStop(0, 'rgba(10,30,12,0)');
  gnd.addColorStop(0.3, 'rgba(15,45,18,0.5)');
  gnd.addColorStop(0.6, 'rgba(12,35,15,0.8)');
  gnd.addColorStop(1, 'rgba(6,20,8,1)');
  ctx.fillStyle = gnd;
  ctx.fillRect(0, H*0.78, W, H*0.22);

  // Undergrowth — ferns/grass silhouettes along ground line
  ctx.fillStyle = 'rgba(15,50,20,0.6)';
  for (let i = 0; i < 40; i++) {
    const fx = (i/40) * W + Math.sin(i*7.7)*20;
    const fh = 15 + Math.sin(i*3.3)*10 + Math.sin(t*0.5+i)*3;
    const fy = H*0.82 + Math.sin(i*5.1)*8;
    // Simple fern triangle
    ctx.beginPath();
    ctx.moveTo(fx - 8, fy);
    ctx.lineTo(fx, fy - fh);
    ctx.lineTo(fx + 8, fy);
    ctx.fill();
  }

  // Draw trees
  for (const tr of trees) {
    const tx = tr.x * W, bY = H * 0.85, tH = tr.h * H, tw = tr.tw * W;
    const gi = 0.3 + 0.2 * Math.sin(t*tr.gs + tr.gp);
    drawTree(tx, bY, tH, tw, tr.hue, gi, W, H, tr.branches);
  }

  // Glowing mushrooms
  for (const m of mushrooms) {
    const mx = m.x*W, my = m.y*H, ms = m.sz*W;
    const gl = 0.5 + 0.3*Math.sin(t*1.5 + m.ph);
    // Stem
    ctx.fillStyle = `hsla(${m.hue},20%,60%,${gl*0.6})`;
    ctx.fillRect(mx - ms*0.15, my, ms*0.3, ms*1.2);
    // Cap
    ctx.beginPath();
    ctx.ellipse(mx, my, ms*0.7, ms*0.4, 0, Math.PI, 0);
    ctx.fillStyle = `hsla(${m.hue},60%,50%,${gl*0.8})`;
    ctx.fill();
    // Cap glow
    const mg = ctx.createRadialGradient(mx, my-ms*0.2, 0, mx, my-ms*0.2, ms*1.5);
    mg.addColorStop(0, `hsla(${m.hue},70%,65%,${gl*0.25})`);
    mg.addColorStop(1, 'hsla(0,0%,0%,0)');
    ctx.fillStyle = mg;
    ctx.beginPath(); ctx.arc(mx, my-ms*0.2, ms*1.5, 0, 6.28); ctx.fill();
  }

  // Ground mist — wispy fog near the bottom
  for (let i = 0; i < 6; i++) {
    const mx = (i/6)*W + Math.sin(t*0.2 + i*2.1)*W*0.05;
    const my = H*0.82 + Math.sin(i*1.7)*H*0.03;
    const mr = W*0.1 + Math.sin(t*0.3+i)*W*0.02;
    const mist = ctx.createRadialGradient(mx, my, 0, mx, my, mr);
    mist.addColorStop(0, `rgba(100,180,120,${0.06+0.03*Math.sin(t*0.5+i)})`);
    mist.addColorStop(1, 'rgba(50,100,60,0)');
    ctx.fillStyle = mist;
    ctx.beginPath(); ctx.arc(mx, my, mr, 0, 6.28); ctx.fill();
  }

  // Floating particles
  for (const p of bgParticles) {
    p.x += Math.sin(t*0.5+p.dr)*0.0003;
    p.y -= p.sp; if (p.y<-0.05){p.y=1.05;p.x=Math.random();}
    const fl = 0.4+0.6*Math.abs(Math.sin(t*2+p.ph));
    ctx.fillStyle = `hsla(${p.hue},80%,70%,${p.a*fl})`;
    ctx.beginPath(); ctx.arc(p.x*W,p.y*H,p.sz*fl,0,6.28); ctx.fill();
  }

  // Glowing orbs
  for (const o of orbs) {
    o.x+=o.dx; o.y+=o.dy;
    if(o.x<0||o.x>1)o.dx*=-1; if(o.y<0.15||o.y>0.95)o.dy*=-1;
    const pu=0.6+0.4*Math.sin(t*1.3+o.ph), r=o.r*pu;
    const og=ctx.createRadialGradient(o.x*W,o.y*H,0,o.x*W,o.y*H,r*2.5);
    og.addColorStop(0,`hsla(${o.hue},80%,80%,${0.5*pu})`);
    og.addColorStop(0.4,`hsla(${o.hue},70%,55%,${0.15*pu})`);
    og.addColorStop(1,'hsla(0,0%,0%,0)');
    ctx.fillStyle=og; ctx.beginPath(); ctx.arc(o.x*W,o.y*H,r*2.5,0,6.28); ctx.fill();
  }
}

// ═══════════════════════════════════════════════════════════════════
// BUTTERFLY WINGS (pure Canvas2D bezier curves + gradients)
// ═══════════════════════════════════════════════════════════════════
function drawWing(targetCtx, cx, cy, scale, flapAngle, pal, side, t) {
  targetCtx.save();
  targetCtx.translate(cx, cy);
  const fs = Math.cos(flapAngle);
  targetCtx.scale(side * fs, 1);
  const s = scale;

  // ── upper wing ──
  targetCtx.beginPath();
  targetCtx.moveTo(0, 0);
  targetCtx.bezierCurveTo(s*0.5, -s*0.9, s*1.3, -s*1.1, s*1.0, -s*0.35);
  targetCtx.bezierCurveTo(s*1.35, -s*0.55, s*1.45, -s*0.05, s*0.85, s*0.1);
  targetCtx.bezierCurveTo(s*0.45, s*0.08, s*0.15, 0.02, 0, 0);
  targetCtx.closePath();
  const ug = targetCtx.createRadialGradient(s*0.55,-s*0.35,0,s*0.55,-s*0.35,s*1.1);
  ug.addColorStop(0, pal.acc); ug.addColorStop(0.35, pal.pri);
  ug.addColorStop(0.75, pal.sec); ug.addColorStop(1,'rgba(0,0,0,0.25)');
  targetCtx.fillStyle = ug; targetCtx.globalAlpha = 0.88; targetCtx.fill();
  targetCtx.strokeStyle='rgba(255,255,255,0.3)'; targetCtx.lineWidth=1.5; targetCtx.stroke();

  // veins
  targetCtx.strokeStyle='rgba(255,255,255,0.18)'; targetCtx.lineWidth=1;
  targetCtx.beginPath(); targetCtx.moveTo(0,0); targetCtx.quadraticCurveTo(s*0.45,-s*0.55,s*0.95,-s*0.35); targetCtx.stroke();
  targetCtx.beginPath(); targetCtx.moveTo(0,0); targetCtx.quadraticCurveTo(s*0.3,-s*0.8,s*0.75,-s*0.7); targetCtx.stroke();
  targetCtx.beginPath(); targetCtx.moveTo(0,0); targetCtx.quadraticCurveTo(s*0.7,-s*0.3,s*1.1,-s*0.1); targetCtx.stroke();

  // eyespot
  const ex=s*0.65, ey=-s*0.45, er=s*0.13;
  const eg=targetCtx.createRadialGradient(ex,ey,0,ex,ey,er);
  eg.addColorStop(0,'#fff'); eg.addColorStop(0.25,pal.acc);
  eg.addColorStop(0.6,'rgba(0,0,0,0.5)'); eg.addColorStop(1,'rgba(0,0,0,0)');
  targetCtx.fillStyle=eg; targetCtx.globalAlpha=0.7;
  targetCtx.beginPath(); targetCtx.arc(ex,ey,er,0,6.28); targetCtx.fill();

  // second smaller eyespot
  const e2x=s*0.9, e2y=-s*0.15, e2r=s*0.07;
  const e2g=targetCtx.createRadialGradient(e2x,e2y,0,e2x,e2y,e2r);
  e2g.addColorStop(0,'#fff'); e2g.addColorStop(0.4,pal.pri);
  e2g.addColorStop(1,'rgba(0,0,0,0)');
  targetCtx.fillStyle=e2g; targetCtx.globalAlpha=0.5;
  targetCtx.beginPath(); targetCtx.arc(e2x,e2y,e2r,0,6.28); targetCtx.fill();

  // ── lower wing ──
  targetCtx.beginPath();
  targetCtx.moveTo(0, 0);
  targetCtx.bezierCurveTo(s*0.25, s*0.15, s*1.05, s*0.25, s*0.85, s*0.65);
  targetCtx.bezierCurveTo(s*0.95, s*0.9, s*0.5, s*1.0, s*0.2, s*0.75);
  targetCtx.bezierCurveTo(s*0.05, s*0.45, 0, s*0.1, 0, 0);
  targetCtx.closePath();
  const lg=targetCtx.createRadialGradient(s*0.45,s*0.5,0,s*0.45,s*0.5,s*0.85);
  lg.addColorStop(0,pal.pri); lg.addColorStop(0.5,pal.sec); lg.addColorStop(1,'rgba(0,0,0,0.25)');
  targetCtx.fillStyle=lg; targetCtx.globalAlpha=0.82; targetCtx.fill();
  targetCtx.strokeStyle='rgba(255,255,255,0.25)'; targetCtx.lineWidth=1.5; targetCtx.stroke();

  // lower veins
  targetCtx.strokeStyle='rgba(255,255,255,0.15)'; targetCtx.lineWidth=1;
  targetCtx.beginPath(); targetCtx.moveTo(0,0); targetCtx.quadraticCurveTo(s*0.3,s*0.4,s*0.65,s*0.7); targetCtx.stroke();
  targetCtx.beginPath(); targetCtx.moveTo(0,0); targetCtx.quadraticCurveTo(s*0.5,s*0.3,s*0.85,s*0.5); targetCtx.stroke();

  // scalloped edge dots (inside lower wing)
  for(let i=0;i<5;i++){
    const a=(i/5)*1.4+0.3, dx=s*0.45+Math.cos(a)*s*0.22, dy=s*0.38+Math.sin(a)*s*0.2;
    targetCtx.fillStyle=pal.acc; targetCtx.globalAlpha=0.35;
    targetCtx.beginPath(); targetCtx.arc(dx,dy,s*0.04,0,6.28); targetCtx.fill();
  }

  // trailing wing tip
  targetCtx.beginPath();
  targetCtx.moveTo(s*0.2, s*0.75);
  targetCtx.bezierCurveTo(s*0.15, s*1.05, s*0.35, s*1.1, s*0.4, s*0.85);
  targetCtx.fillStyle=pal.sec; targetCtx.globalAlpha=0.5; targetCtx.fill();

  targetCtx.globalAlpha = 1;
  targetCtx.restore();
}

// ═══════════════════════════════════════════════════════════════════
// SPARKLE EFFECTS
// ═══════════════════════════════════════════════════════════════════
const sparkleCache = new Map();
function getSparkles(id) {
  if (!sparkleCache.has(id)) {
    const arr = [];
    for (let i = 0; i < 24; i++) arr.push({
      ox:(Math.random()-0.5)*2.2, oy:(Math.random()-0.5)*2.2,
      sz:1+Math.random()*3, ph:Math.random()*6.28, sp:1.5+Math.random()*2.5
    });
    sparkleCache.set(id, arr);
  }
  return sparkleCache.get(id);
}

function drawSparkles(targetCtx, cx, cy, scale, pal, t, id) {
  const sps = getSparkles(id);
  for (const sp of sps) {
    const fl = 0.2+0.8*Math.abs(Math.sin(t*sp.sp+sp.ph));
    const sx = cx+sp.ox*scale, sy = cy+sp.oy*scale, r = sp.sz*fl;
    targetCtx.save();
    targetCtx.translate(sx, sy);
    targetCtx.rotate(t*1.5+sp.ph);
    targetCtx.fillStyle = `hsla(50,90%,85%,${fl*0.7})`;
    targetCtx.beginPath();
    for (let i=0;i<4;i++){
      const a=(i/4)*6.28;
      targetCtx.lineTo(Math.cos(a)*r*2.5, Math.sin(a)*r*2.5);
      targetCtx.lineTo(Math.cos(a+0.785)*r*0.5, Math.sin(a+0.785)*r*0.5);
    }
    targetCtx.closePath(); targetCtx.fill();
    targetCtx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════════
// POSE + SEGMENTATION STATE
// ═══════════════════════════════════════════════════════════════════
let poses = [];
let segmentationMask = null; // Float32Array from PoseLandmarker
let maskWidth = 0, maskHeight = 0;

// ═══════════════════════════════════════════════════════════════════
// STABLE POSE TRACKING — match detections to tracked persons by proximity
// Prevents index shuffling, deduplicates overlapping detections,
// and filters out small false-positive poses.
// ═══════════════════════════════════════════════════════════════════
const SMOOTH = 0.35;
const MIN_SHOULDER_DIST = 0.03; // minimum normalized shoulder span to accept a pose
const DEDUP_DIST = 0.08; // if two poses' torso centers are closer than this, keep only the one with better visibility
const MAX_MATCH_DIST = 0.15; // max distance to match a detection to a tracked person
const TRACK_TIMEOUT = 500; // ms before a lost track is removed

let trackedPersons = []; // { id, landmarks (smoothed), lastSeen (timestamp), phase, smoothMotion }
let nextPersonId = 0;

function getShoulderCenter(lm) {
  const ls = lm[11], rs = lm[12];
  if (!ls || !rs || ls.visibility < 0.4 || rs.visibility < 0.4) return null;
  const dist = Math.hypot(rs.x - ls.x, rs.y - ls.y);
  if (dist < MIN_SHOULDER_DIST) return null;
  return { x: (ls.x + rs.x) / 2, y: (ls.y + rs.y) / 2, dist };
}

function processPoses(rawPoses, now) {
  // 1) Filter: only keep poses with visible shoulders and minimum size
  const valid = [];
  for (const lm of rawPoses) {
    const sc = getShoulderCenter(lm);
    if (sc) valid.push({ lm, cx: sc.x, cy: sc.y, shoulderDist: sc.dist });
  }

  // 2) Deduplicate: if two detections overlap, keep the one with wider shoulders
  const keep = valid.map(() => true);
  for (let a = 0; a < valid.length; a++) {
    if (!keep[a]) continue;
    for (let b = a + 1; b < valid.length; b++) {
      if (!keep[b]) continue;
      const d = Math.hypot(valid[a].cx - valid[b].cx, valid[a].cy - valid[b].cy);
      if (d < DEDUP_DIST) {
        keep[valid[a].shoulderDist >= valid[b].shoulderDist ? b : a] = false;
      }
    }
  }
  const deduped = valid.filter((_, i) => keep[i]);

  // 3) Match detections to existing tracked persons (Hungarian-lite: greedy nearest)
  const matched = new Set();    // indices into trackedPersons
  const assigned = new Set();   // indices into deduped
  const pairs = [];

  // Build all candidate pairs sorted by distance
  for (let d = 0; d < deduped.length; d++) {
    for (let t = 0; t < trackedPersons.length; t++) {
      const tp = trackedPersons[t];
      const sc = getShoulderCenter(tp.landmarks);
      if (!sc) continue;
      const dist = Math.hypot(deduped[d].cx - sc.x, deduped[d].cy - sc.y);
      if (dist < MAX_MATCH_DIST) pairs.push({ d, t, dist });
    }
  }
  pairs.sort((a, b) => a.dist - b.dist);

  for (const p of pairs) {
    if (matched.has(p.t) || assigned.has(p.d)) continue;
    matched.add(p.t);
    assigned.add(p.d);
    // Smooth update existing track
    const tp = trackedPersons[p.t];
    const raw = deduped[p.d].lm;
    for (let j = 0; j < raw.length && j < tp.landmarks.length; j++) {
      tp.landmarks[j].x = tp.landmarks[j].x * SMOOTH + raw[j].x * (1 - SMOOTH);
      tp.landmarks[j].y = tp.landmarks[j].y * SMOOTH + raw[j].y * (1 - SMOOTH);
      tp.landmarks[j].z = tp.landmarks[j].z * SMOOTH + raw[j].z * (1 - SMOOTH);
      tp.landmarks[j].visibility = raw[j].visibility;
    }
    tp.lastSeen = now;
  }

  // 4) Create new tracks for unmatched detections
  for (let d = 0; d < deduped.length; d++) {
    if (assigned.has(d)) continue;
    trackedPersons.push({
      id: nextPersonId++,
      landmarks: deduped[d].lm.map(lm => ({ ...lm })),
      lastSeen: now,
      phase: nextPersonId * 1.1,
      smoothMotion: 0,
      prevCx: deduped[d].cx,
      prevCy: deduped[d].cy,
      prevT: now / 1000,
    });
  }

  // 5) Remove stale tracks
  trackedPersons = trackedPersons.filter(tp => now - tp.lastSeen < TRACK_TIMEOUT);

  // 6) Output: set poses array from tracked persons
  poses = trackedPersons.map(tp => tp.landmarks);
}

// ═══════════════════════════════════════════════════════════════════
// PERSON CUTOUT — uses segmentation mask to extract people from webcam
// ═══════════════════════════════════════════════════════════════════
function drawPersonCutout(W, H) {
  if (!segmentationMask || video.readyState < 2) return;

  const vw = video.videoWidth, vh = video.videoHeight;

  // Fit video to canvas dimensions (same math as before)
  const va = vw/vh, ca = W/H;
  let dw, dh, dx, dy;
  if (ca > va) { dw = W; dh = W/va; dx = 0; dy = (H-dh)/2; }
  else { dh = H; dw = H*va; dx = (W-dw)/2; dy = 0; }

  // 1) Draw the segmentation mask as alpha onto maskCanvas
  maskCanvas.width = maskWidth;
  maskCanvas.height = maskHeight;
  const maskImgData = maskCtx.createImageData(maskWidth, maskHeight);
  for (let i = 0; i < segmentationMask.length; i++) {
    const confidence = segmentationMask[i];
    // Mask value is confidence that pixel belongs to a person (0-1)
    const alpha = Math.min(255, Math.max(0, confidence * 255));
    maskImgData.data[i * 4]     = 255; // R
    maskImgData.data[i * 4 + 1] = 255; // G
    maskImgData.data[i * 4 + 2] = 255; // B
    maskImgData.data[i * 4 + 3] = alpha; // A — person confidence
  }
  maskCtx.putImageData(maskImgData, 0, 0);

  // 2) On personCanvas: draw webcam, then use mask to cut out only people
  personCanvas.width = W;
  personCanvas.height = H;
  personCtx.clearRect(0, 0, W, H);

  // Draw the mask scaled to canvas size (mirrored)
  personCtx.save();
  personCtx.translate(W, 0);
  personCtx.scale(-1, 1);
  personCtx.drawImage(maskCanvas, dx, dy, dw, dh);
  personCtx.restore();

  // 'source-in': only keep webcam pixels where mask alpha > 0
  personCtx.globalCompositeOperation = 'source-in';
  personCtx.save();
  personCtx.translate(W, 0);
  personCtx.scale(-1, 1);
  personCtx.drawImage(video, dx, dy, dw, dh);
  personCtx.restore();
  personCtx.globalCompositeOperation = 'source-over';

  // 3) Draw the cutout person onto the main canvas
  ctx.drawImage(personCanvas, 0, 0);
}

// ═══════════════════════════════════════════════════════════════════
// RAINBOW EFFECT — triggered when both arms are raised
// ═══════════════════════════════════════════════════════════════════
const rainbowAlpha = new Map();
const rainbowColors = [
  'rgba(255,0,0,',    // red
  'rgba(255,127,0,',  // orange
  'rgba(255,255,0,',  // yellow
  'rgba(0,200,0,',    // green
  'rgba(0,150,255,',  // blue
  'rgba(75,0,130,',   // indigo
  'rgba(148,0,211,',  // violet
];

function drawRainbow(x1, y1, x2, y2, alpha, t) {
  const cx = (x1 + x2) / 2;
  const cy = Math.min(y1, y2);
  const span = Math.abs(x2 - x1);
  const arcHeight = span * 0.5;
  const bandWidth = span * 0.018 + 3;

  ctx.save();
  ctx.globalAlpha = alpha * 0.75;
  ctx.lineCap = 'round';

  for (let b = 0; b < rainbowColors.length; b++) {
    const radius = span * 0.4 + b * bandWidth;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, Math.PI, 0);
    ctx.strokeStyle = rainbowColors[b] + (0.8 - b * 0.05) + ')';
    ctx.lineWidth = bandWidth + 1;
    ctx.stroke();
  }

  // Soft glow behind the rainbow
  const glowGrad = ctx.createRadialGradient(cx, cy, span*0.15, cx, cy, span*0.6);
  glowGrad.addColorStop(0, `rgba(255,255,200,${alpha*0.15})`);
  glowGrad.addColorStop(0.5, `rgba(255,200,255,${alpha*0.08})`);
  glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glowGrad;
  ctx.beginPath(); ctx.arc(cx, cy, span*0.6, 0, 6.28); ctx.fill();

  // Sparkles along the rainbow arc
  for (let s = 0; s < 12; s++) {
    const angle = Math.PI + (s / 12) * Math.PI * -1;
    const r = span * 0.4 + Math.sin(t * 3 + s * 1.7) * bandWidth * 3;
    const sx = cx + Math.cos(angle) * r;
    const sy = cy + Math.sin(angle) * r;
    const fl = 0.4 + 0.6 * Math.abs(Math.sin(t * 4 + s * 2.1));
    ctx.fillStyle = `rgba(255,255,255,${fl * alpha * 0.7})`;
    ctx.beginPath();
    ctx.arc(sx, sy, 2 + fl * 2, 0, 6.28);
    ctx.fill();
  }

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════
// RENDER LOOP
// Layering order: Forest → Wings → Person cutout → Sparkles → Rainbow
// ═══════════════════════════════════════════════════════════════════
function render(ts) {
  const t = ts / 1000;
  const W = canvas.width, H = canvas.height;

  // ── Layer 1: Forest background ──
  drawForest(t);

  // ── Layer 1.5: Scanned butterflies flying in the forest ──
  drawForestButterflies(t);

  // ── Layer 2: Butterfly wings (behind people) ──
  for (let i = 0; i < trackedPersons.length; i++) {
    const tp = trackedPersons[i];
    const lm = tp.landmarks;
    const ls = lm[11], rs = lm[12]; // shoulders
    if (!ls || !rs || ls.visibility < 0.4 || rs.visibility < 0.4) continue;

    const pal = wingPalettes[tp.id % wingPalettes.length];
    const lx = (1-ls.x)*W, ly = ls.y*H;
    const rx = (1-rs.x)*W, ry = rs.y*H;
    const cx = (lx+rx)/2, cy = (ly+ry)/2;
    const sDist = Math.hypot(rx-lx, ry-ly);
    const wScale = sDist * 1.15;

    // Motion → faster flap (using phase accumulator per tracked person)
    const motion = Math.hypot(cx - (tp.prevCx || cx), cy - (tp.prevCy || cy));
    tp.smoothMotion = (tp.smoothMotion || 0) * 0.85 + motion * 0.15;
    const flapSpeed = 1.8 + Math.min(tp.smoothMotion * 0.04, 3);
    const dt = t - (tp.prevT || t);
    tp.phase = (tp.phase || 0) + flapSpeed * dt;
    tp.prevCx = cx; tp.prevCy = cy; tp.prevT = t;
    const flapAngle = Math.sin(tp.phase) * 0.5;

    // Wing glow
    const gg = ctx.createRadialGradient(cx,cy,wScale*0.15,cx,cy,wScale*1.6);
    gg.addColorStop(0, pal.glow); gg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(cx,cy,wScale*1.6,0,6.28); ctx.fill();

    // Wings anchored to shoulders
    drawWing(ctx, rx, ry, wScale, flapAngle, pal, 1, t);
    drawWing(ctx, lx, ly, wScale, -flapAngle, pal, -1, t);
  }

  // ── Layer 3: Person cutout (in front of wings, no real background) ──
  drawPersonCutout(W, H);

  // ── Layer 4: Sparkles (in front of everything) ──
  for (let i = 0; i < trackedPersons.length; i++) {
    const tp = trackedPersons[i];
    const lm = tp.landmarks;
    const ls = lm[11], rs = lm[12];
    if (!ls || !rs || ls.visibility < 0.4 || rs.visibility < 0.4) continue;
    const pal = wingPalettes[tp.id % wingPalettes.length];
    const lx = (1-ls.x)*W, ly = ls.y*H;
    const rx = (1-rs.x)*W, ry = rs.y*H;
    const cx = (lx+rx)/2, cy = (ly+ry)/2;
    const sDist = Math.hypot(rx-lx, ry-ly);
    const wScale = sDist * 1.15;
    drawSparkles(ctx, cx, cy, wScale, pal, t, tp.id);
  }

  // ── Layer 5: Rainbow when both arms are raised ──
  for (let i = 0; i < trackedPersons.length; i++) {
    const tp = trackedPersons[i];
    const lm = tp.landmarks;
    // Landmarks: 11/12 = shoulders, 15/16 = wrists
    const ls = lm[11], rs = lm[12], lw = lm[15], rw = lm[16];
    if (!ls || !rs || !lw || !rw) continue;
    if (lw.visibility < 0.4 || rw.visibility < 0.4) continue;

    // Both wrists must be clearly above their respective shoulders
    const shoulderSpan = Math.abs(rs.x - ls.x);
    const threshold = shoulderSpan * 0.5; // must be half a shoulder-width above
    if (lw.y < ls.y - threshold && rw.y < rs.y - threshold) {
      const lwx = (1-lw.x)*W, lwy = lw.y*H;
      const rwx = (1-rw.x)*W, rwy = rw.y*H;

      // Smooth the rainbow activation (keyed by stable person id)
      const key = `rainbow_${tp.id}`;
      const prevAlpha = rainbowAlpha.get(key) || 0;
      const targetAlpha = 1;
      const alpha = prevAlpha + (targetAlpha - prevAlpha) * 0.1;
      rainbowAlpha.set(key, alpha);

      if (alpha > 0.05) {
        drawRainbow(lwx, lwy, rwx, rwy, alpha, t);
      }
    } else {
      // Fade out
      const key = `rainbow_${tp.id}`;
      const prevAlpha = rainbowAlpha.get(key) || 0;
      const alpha = prevAlpha * 0.9;
      rainbowAlpha.set(key, alpha);
      if (alpha > 0.05) {
        const lwx = (1-lw.x)*W, lwy = lw.y*H;
        const rwx = (1-rw.x)*W, rwy = rw.y*H;
        drawRainbow(lwx, lwy, rwx, rwy, alpha, t);
      }
    }
  }

  requestAnimationFrame(render);
}

// ═══════════════════════════════════════════════════════════════════
// FLYING BUTTERFLIES — scanned drawings that live in the forest
// ═══════════════════════════════════════════════════════════════════
const forestButterflies = [];

// Build the wing bezier clip path (matches template.html exactly)
function wingClipPath(ctx, cx, cy, s, dir) {
  // Upper wing
  ctx.moveTo(cx, cy - 18);
  ctx.bezierCurveTo(
    cx + dir*s*0.5, cy - 18 - s*0.9,
    cx + dir*s*1.3, cy - 18 - s*1.1,
    cx + dir*s*1.0, cy - 18 - s*0.35
  );
  ctx.bezierCurveTo(
    cx + dir*s*1.35, cy - 18 - s*0.55,
    cx + dir*s*1.45, cy - 18 - s*0.05,
    cx + dir*s*0.85, cy - 18 + s*0.1
  );
  ctx.bezierCurveTo(
    cx + dir*s*0.45, cy - 18 + s*0.08,
    cx + dir*s*0.15, cy - 18 + 0.02,
    cx, cy - 18
  );
  // Lower wing
  ctx.moveTo(cx, cy + 6);
  ctx.bezierCurveTo(
    cx + dir*s*0.25, cy + 6 + s*0.15,
    cx + dir*s*1.05, cy + 6 + s*0.25,
    cx + dir*s*0.85, cy + 6 + s*0.65
  );
  ctx.bezierCurveTo(
    cx + dir*s*0.95, cy + 6 + s*0.9,
    cx + dir*s*0.5,  cy + 6 + s*1.0,
    cx + dir*s*0.2,  cy + 6 + s*0.75
  );
  ctx.bezierCurveTo(
    cx + dir*s*0.05, cy + 6 + s*0.45,
    cx, cy + 6 + s*0.1,
    cx, cy + 6
  );
}

// Capture the actual drawing from the paper, masked to butterfly wing shape
function captureButterflySpriteFromPaper(sourceCanvas, rect) {
  const spriteW = 300;
  const spriteH = Math.round(spriteW * (rect.h / rect.w));

  // 1) Crop paper area into a temp canvas
  const tmp = document.createElement('canvas');
  tmp.width = spriteW;
  tmp.height = spriteH;
  const tCtx = tmp.getContext('2d');
  tCtx.drawImage(sourceCanvas, rect.x, rect.y, rect.w, rect.h, 0, 0, spriteW, spriteH);

  // 2) Create masked sprite — wing shapes only
  const s = spriteW * 0.309; // wing scale matching template (210/680)
  const cx = spriteW / 2;
  const cy = spriteH * 0.46;

  const masked = document.createElement('canvas');
  masked.width = spriteW;
  masked.height = spriteH;
  const mCtx = masked.getContext('2d');

  // Draw wing shapes as a filled region (this becomes our alpha mask)
  mCtx.fillStyle = '#fff';
  mCtx.beginPath();
  wingClipPath(mCtx, cx, cy, s, 1);  // right wing
  wingClipPath(mCtx, cx, cy, s, -1); // left wing
  mCtx.fill();

  // source-in: keep only the paper pixels inside the wing shapes
  mCtx.globalCompositeOperation = 'source-in';
  mCtx.drawImage(tmp, 0, 0);
  mCtx.globalCompositeOperation = 'source-over';

  // Also add a thin black outline for definition at small sizes
  mCtx.strokeStyle = 'rgba(0,0,0,0.3)';
  mCtx.lineWidth = 1.5;
  mCtx.beginPath();
  wingClipPath(mCtx, cx, cy, s, 1);
  wingClipPath(mCtx, cx, cy, s, -1);
  mCtx.stroke();

  // Return sprite + metadata for drawing
  return { canvas: masked, w: spriteW, h: spriteH, s, cx, cy };
}

function addForestButterfly(sprite, glowColor) {
  forestButterflies.push({
    x: Math.random(),
    y: 0.2 + Math.random() * 0.5,
    size: 18 + Math.random() * 14,
    phase: Math.random() * 6.28,
    flapSpeed: 3 + Math.random() * 2,
    pathPhaseX: Math.random() * 6.28,
    pathPhaseY: Math.random() * 6.28,
    pathSpeedX: 0.15 + Math.random() * 0.2,
    pathSpeedY: 0.1 + Math.random() * 0.15,
    pathRadiusX: 0.08 + Math.random() * 0.12,
    pathRadiusY: 0.04 + Math.random() * 0.06,
    baseX: 0.1 + Math.random() * 0.8,
    baseY: 0.15 + Math.random() * 0.55,
    sprite,       // { canvas, w, h, s, cx, cy }
    glowColor,    // rgba string for the glow effect
  });
}

function drawForestButterflies(t) {
  const W = canvas.width, H = canvas.height;
  for (const fb of forestButterflies) {
    // Wandering motion
    fb.x = fb.baseX + Math.sin(t * fb.pathSpeedX + fb.pathPhaseX) * fb.pathRadiusX;
    fb.y = fb.baseY + Math.sin(t * fb.pathSpeedY + fb.pathPhaseY) * fb.pathRadiusY;
    // Slowly drift the base position
    fb.baseX += Math.sin(t * 0.05 + fb.pathPhaseX) * 0.00008;
    fb.baseY += Math.cos(t * 0.04 + fb.pathPhaseY) * 0.00005;
    // Wrap around
    if (fb.baseX < -0.05) fb.baseX = 1.05;
    if (fb.baseX > 1.05) fb.baseX = -0.05;
    fb.baseY = Math.max(0.1, Math.min(0.7, fb.baseY));

    const fx = fb.x * W, fy = fb.y * H;
    const flapAngle = Math.sin(t * fb.flapSpeed + fb.phase) * 0.7;
    const flapCos = Math.cos(flapAngle);

    // Glow behind the butterfly
    ctx.save();
    const glow = ctx.createRadialGradient(fx, fy, 0, fx, fy, fb.size * 2);
    glow.addColorStop(0, fb.glowColor);
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(fx, fy, fb.size * 2, 0, 6.28); ctx.fill();
    ctx.restore();

    // Draw sprite with flapping wings
    const sp = fb.sprite;
    const scale = fb.size / sp.s; // map display size to sprite wing scale
    const drawW = sp.w * scale;
    const drawH = sp.h * scale;
    // Body center in draw coords
    const bodyOffsetX = sp.cx * scale;
    const bodyOffsetY = sp.cy * scale;

    // Right wing: right half of sprite
    ctx.save();
    ctx.translate(fx, fy);
    ctx.scale(flapCos, 1);
    ctx.drawImage(sp.canvas,
      sp.w/2, 0, sp.w/2, sp.h,             // source: right half
      0, -bodyOffsetY, drawW/2, drawH       // dest: body center at origin
    );
    ctx.restore();

    // Left wing: left half of sprite (already correctly oriented, just position left)
    ctx.save();
    ctx.translate(fx, fy);
    ctx.scale(flapCos, 1);
    ctx.drawImage(sp.canvas,
      0, 0, sp.w/2, sp.h,                  // source: left half
      -drawW/2, -bodyOffsetY, drawW/2, drawH // dest: draw to the left of center
    );
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════════
// SCAN MODE — detect paper, sample colors, spawn butterfly
// ═══════════════════════════════════════════════════════════════════
let scanMode = false;
const scanOverlay = document.getElementById('scanOverlay');
const scanCanvas = document.getElementById('scanCanvas');
const scanCtx = scanCanvas.getContext('2d');
const scanMsg = document.getElementById('scanMsg');
const scanButtons = document.getElementById('scanButtons');
const scanPreview = document.getElementById('scanPreview');
const previewCanvas = document.getElementById('previewCanvas');
const previewCtx = previewCanvas.getContext('2d');
let scanAnimFrame = null;

let pendingSprite = null;
let pendingGlowColor = null;

document.getElementById('scanBtn').addEventListener('click', enterScanMode);
document.getElementById('captureBtn').addEventListener('click', captureAndSample);
document.getElementById('scanCancelBtn').addEventListener('click', exitScanMode);
document.getElementById('confirmBtn').addEventListener('click', confirmButterfly);
document.getElementById('rescanBtn').addEventListener('click', rescan);

function enterScanMode() {
  scanMode = true;
  scanOverlay.classList.add('active');
  scanPreview.classList.remove('active');
  scanCanvas.style.display = '';
  scanMsg.style.display = '';
  scanButtons.style.display = 'flex';
  scanMsg.textContent = 'Placera teckningen i rutan och tryck "Fånga!"';
  scanLoop();
}

function exitScanMode() {
  scanMode = false;
  scanOverlay.classList.remove('active');
  if (scanAnimFrame) cancelAnimationFrame(scanAnimFrame);
}

// Fixed guide rectangle: A4 portrait proportions centered in the webcam frame
function getGuideRect(vw, vh) {
  const aspect = 680 / 960; // A4-ish (template proportions)
  const margin = 0.08; // 8% margin on each side
  let rh = vh * (1 - margin * 2);
  let rw = rh * aspect;
  if (rw > vw * (1 - margin * 2)) {
    rw = vw * (1 - margin * 2);
    rh = rw / aspect;
  }
  return {
    x: (vw - rw) / 2,
    y: (vh - rh) / 2,
    w: rw,
    h: rh,
  };
}

function scanLoop() {
  if (!scanMode || video.readyState < 2) {
    scanAnimFrame = requestAnimationFrame(scanLoop);
    return;
  }
  const vw = video.videoWidth, vh = video.videoHeight;
  scanCanvas.width = vw;
  scanCanvas.height = vh;

  // Draw mirrored webcam
  scanCtx.save();
  scanCtx.translate(vw, 0);
  scanCtx.scale(-1, 1);
  scanCtx.drawImage(video, 0, 0);
  scanCtx.restore();

  // Dim area outside the guide rectangle
  const rect = getGuideRect(vw, vh);
  scanCtx.fillStyle = 'rgba(0,0,0,0.45)';
  scanCtx.fillRect(0, 0, vw, rect.y);                          // top
  scanCtx.fillRect(0, rect.y + rect.h, vw, vh - rect.y - rect.h); // bottom
  scanCtx.fillRect(0, rect.y, rect.x, rect.h);                 // left
  scanCtx.fillRect(rect.x + rect.w, rect.y, vw - rect.x - rect.w, rect.h); // right

  // Draw guide rectangle
  scanCtx.strokeStyle = 'rgba(180,100,255,0.8)';
  scanCtx.lineWidth = 3;
  scanCtx.setLineDash([10, 6]);
  scanCtx.strokeRect(rect.x, rect.y, rect.w, rect.h);
  scanCtx.setLineDash([]);

  // Corner markers for easier alignment
  const cornerLen = Math.min(rect.w, rect.h) * 0.06;
  scanCtx.strokeStyle = '#4ade80';
  scanCtx.lineWidth = 4;
  scanCtx.setLineDash([]);
  const corners = [
    [rect.x, rect.y], [rect.x + rect.w, rect.y],
    [rect.x, rect.y + rect.h], [rect.x + rect.w, rect.y + rect.h],
  ];
  for (const [cx, cy] of corners) {
    const dx = cx === rect.x ? 1 : -1;
    const dy = cy === rect.y ? 1 : -1;
    scanCtx.beginPath();
    scanCtx.moveTo(cx + dx * cornerLen, cy);
    scanCtx.lineTo(cx, cy);
    scanCtx.lineTo(cx, cy + dy * cornerLen);
    scanCtx.stroke();
  }

  scanAnimFrame = requestAnimationFrame(scanLoop);
}

function getSampleZones(rect) {
  const cx = rect.x + rect.w / 2;
  const cy = rect.y + rect.h * 0.46;
  const zw = rect.w * 0.12;
  const zh = rect.h * 0.10;
  return [
    { x: cx - rect.w*0.22 - zw/2, y: cy - rect.h*0.11 - zh/2, w: zw, h: zh },
    { x: cx - rect.w*0.17 - zw/2, y: cy + rect.h*0.08 - zh/2, w: zw, h: zh },
    { x: cx + rect.w*0.22 - zw/2, y: cy - rect.h*0.11 - zh/2, w: zw, h: zh },
    { x: cx + rect.w*0.17 - zw/2, y: cy + rect.h*0.08 - zh/2, w: zw, h: zh },
  ];
}

function sampleZoneColor(context, zone) {
  const imgData = context.getImageData(
    Math.round(zone.x), Math.round(zone.y),
    Math.round(zone.w), Math.round(zone.h)
  );
  const d = imgData.data;
  let rSum = 0, gSum = 0, bSum = 0, count = 0;
  for (let i = 0; i < d.length; i += 4) {
    rSum += d[i]; gSum += d[i+1]; bSum += d[i+2];
    count++;
  }
  if (count === 0) return { r: 200, g: 200, b: 200 };
  return {
    r: Math.round(rSum / count),
    g: Math.round(gSum / count),
    b: Math.round(bSum / count),
  };
}

function rgbToHex(c) {
  return '#' + [c.r, c.g, c.b].map(v => v.toString(16).padStart(2, '0')).join('');
}

function rgbToGlow(c, a) {
  return `rgba(${c.r},${c.g},${c.b},${a})`;
}

function captureAndSample() {
  if (video.readyState < 2) return;
  const vw = video.videoWidth, vh = video.videoHeight;

  // Freeze current frame (clean, no overlay drawn on it)
  const captureCanvas = document.createElement('canvas');
  captureCanvas.width = vw;
  captureCanvas.height = vh;
  const capCtx = captureCanvas.getContext('2d');
  capCtx.save();
  capCtx.translate(vw, 0);
  capCtx.scale(-1, 1);
  capCtx.drawImage(video, 0, 0);
  capCtx.restore();

  // Use the fixed guide rectangle as the paper region
  const rect = getGuideRect(vw, vh);

  // Capture the actual drawing as a masked butterfly sprite
  const sprite = captureButterflySpriteFromPaper(captureCanvas, rect);

  // Sample a dominant color for the glow effect (defensive clamping)
  let glowColor = 'rgba(180,100,255,0.35)';
  try {
    const zones = getSampleZones(rect);
    const colors = zones.map(z => {
      z.x = Math.max(0, Math.min(z.x, vw - z.w));
      z.y = Math.max(0, Math.min(z.y, vh - z.h));
      return sampleZoneColor(capCtx, z);
    });
    let bestColor = colors[0], bestSat = 0;
    for (const c of colors) {
      const mx = Math.max(c.r, c.g, c.b), mn = Math.min(c.r, c.g, c.b);
      const sat = mx > 0 ? (mx - mn) / mx : 0;
      if (sat > bestSat) { bestSat = sat; bestColor = c; }
    }
    glowColor = `rgba(${bestColor.r},${bestColor.g},${bestColor.b},0.35)`;
  } catch(e) { console.warn('Color sampling failed:', e); }

  // Stop the scan loop and hide the live feed so preview buttons are visible
  if (scanAnimFrame) { cancelAnimationFrame(scanAnimFrame); scanAnimFrame = null; }

  // Show preview with confirm/rescan choice
  pendingSprite = sprite;
  pendingGlowColor = glowColor;
  scanButtons.style.display = 'none';
  scanCanvas.style.display = 'none';
  scanMsg.style.display = 'none';
  scanPreview.classList.add('active');

  // Draw the captured butterfly sprite in the preview
  previewCanvas.width = 200;
  previewCanvas.height = 200;
  previewCtx.clearRect(0, 0, 200, 200);
  // Scale sprite to fit preview canvas
  const fitScale = Math.min(180 / sprite.w, 180 / sprite.h);
  const pw = sprite.w * fitScale, ph = sprite.h * fitScale;
  previewCtx.drawImage(sprite.canvas,
    0, 0, sprite.w, sprite.h,
    (200 - pw) / 2, (200 - ph) / 2, pw, ph
  );

  document.getElementById('previewMsg').textContent = 'Din fjäril!';
}

function confirmButterfly() {
  if (pendingSprite) {
    addForestButterfly(pendingSprite, pendingGlowColor);
    document.getElementById('previewMsg').textContent = 'Din fjäril flyger in i skogen!';
    pendingSprite = null;
    pendingGlowColor = null;
    setTimeout(exitScanMode, 1500);
  }
}

function rescan() {
  pendingSprite = null;
  pendingGlowColor = null;
  scanPreview.classList.remove('active');
  scanCanvas.style.display = '';
  scanMsg.style.display = '';
  scanButtons.style.display = 'flex';
  scanMsg.textContent = 'Placera teckningen i rutan och tryck "Fånga!"';
  scanLoop();
}

// ═══════════════════════════════════════════════════════════════════
// INIT — MediaPipe Tasks Vision PoseLandmarker (multi-pose + segmentation)
// ═══════════════════════════════════════════════════════════════════
async function init() {
  const CDN = 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18';
  const MODEL = 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task';

  let poseLandmarker;
  // Try GPU first, fall back to CPU (known issue: GPU + segmentation can be blank)
  for (const delegate of ['GPU', 'CPU']) {
    try {
      const filesetResolver = await FilesetResolver.forVisionTasks(`${CDN}/wasm`);
      poseLandmarker = await PoseLandmarker.createFromOptions(filesetResolver, {
        baseOptions: { modelAssetPath: MODEL, delegate },
        runningMode: 'VIDEO',
        numPoses: 8,
        minPoseDetectionConfidence: 0.5,
        minPosePresenceConfidence: 0.5,
        minTrackingConfidence: 0.4,
        outputSegmentationMasks: true,
      });
      console.log(`PoseLandmarker created with ${delegate} delegate`);
      break;
    } catch(e) {
      console.warn(`${delegate} delegate failed:`, e);
      if (delegate === 'CPU') throw e; // both failed
    }
  }

  // Start webcam
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width:{ideal:1280}, height:{ideal:720}, facingMode:'user' },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
  } catch(err) {
    loadingEl.innerHTML = `<div style="color:#ff6b6b;text-align:center">
      <p>Kunde inte starta kameran.</p>
      <p style="font-size:16px;margin-top:10px">${err.message}</p>
      <p style="font-size:14px;margin-top:10px;color:#aaa">Se till att kameran är ansluten och tillåt åtkomst.</p></div>`;
    return;
  }

  loadingEl.style.display = 'none';
  requestAnimationFrame(render);

  // Detection loop
  let lastVideoTime = -1;
  function detect() {
    if (video.readyState >= 2 && video.currentTime !== lastVideoTime) {
      lastVideoTime = video.currentTime;
      const result = poseLandmarker.detectForVideo(video, performance.now());
      if (result) {
        if (result.landmarks) {
          processPoses(result.landmarks, performance.now());
        }
        // Get segmentation masks and merge all persons into one mask
        if (result.segmentationMasks && result.segmentationMasks.length > 0) {
          try {
            const firstMask = result.segmentationMasks[0];
            maskWidth = firstMask.width;
            maskHeight = firstMask.height;
            const merged = firstMask.getAsFloat32Array().slice(); // copy
            // Merge additional person masks by taking max confidence per pixel
            for (let m = 1; m < result.segmentationMasks.length; m++) {
              const extra = result.segmentationMasks[m].getAsFloat32Array();
              for (let p = 0; p < merged.length; p++) {
                if (extra[p] > merged[p]) merged[p] = extra[p];
              }
            }
            segmentationMask = merged;
          } catch(e) {
            // Some versions/delegates may not support this; fall back gracefully
          }
        }
      }
    }
    requestAnimationFrame(detect);
  }
  detect();
}

init();
</script>
