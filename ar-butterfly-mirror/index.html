<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fjärilsskogen - AR Butterfly Mirror</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  #mainCanvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  video { display: none; }
  canvas.offscreen { display: none; }
  #fullscreenBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 100;
    background: rgba(100, 50, 150, 0.7);
    color: #fff;
    border: 2px solid rgba(255, 255, 255, 0.4);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: background 0.3s;
  }
  #fullscreenBtn:hover { background: rgba(140, 70, 200, 0.9); cursor: pointer; }
  #title {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    color: #fff;
    font-size: clamp(20px, 4vw, 42px);
    font-weight: bold;
    text-shadow: 0 0 20px rgba(180,100,255,0.8), 0 0 40px rgba(100,200,255,0.5);
    pointer-events: none;
    white-space: nowrap;
    animation: titleGlow 3s ease-in-out infinite alternate;
  }
  @keyframes titleGlow {
    from { text-shadow: 0 0 20px rgba(180,100,255,0.8), 0 0 40px rgba(100,200,255,0.5); }
    to   { text-shadow: 0 0 30px rgba(220,140,255,1), 0 0 60px rgba(140,220,255,0.8), 0 0 80px rgba(255,180,255,0.4); }
  }
  #loading {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #1a0a2e; z-index: 200;
    color: #d4a0ff; font-size: 24px; gap: 20px;
  }
  .spinner {
    width: 60px; height: 60px;
    border: 4px solid rgba(180,100,255,0.3);
    border-top-color: #b060ff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div>Laddar Fjärilsskogen...</div>
</div>

<div id="title">&#x1F98B; Välkommen till Fjärilsskogen! &#x1F98B;</div>
<button id="fullscreenBtn" onclick="document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()">&#x26F6; Fullskärm</button>

<canvas id="mainCanvas"></canvas>
<video id="webcam" playsinline autoplay muted></video>

<!-- Offscreen canvases for compositing -->
<canvas id="maskCanvas" class="offscreen"></canvas>
<canvas id="personCanvas" class="offscreen"></canvas>

<script type="module">
const { PoseLandmarker, FilesetResolver } = await import(
  'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/+esm'
);

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const video = document.getElementById('webcam');
const loadingEl = document.getElementById('loading');

// Offscreen canvases for person cutout compositing
const maskCanvas = document.getElementById('maskCanvas');
const maskCtx = maskCanvas.getContext('2d');
const personCanvas = document.getElementById('personCanvas');
const personCtx = personCanvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ═══════════════════════════════════════════════════════════════════
// WING PALETTES — one per detected person
// ═══════════════════════════════════════════════════════════════════
const wingPalettes = [
  { pri:'#ff6ec7', sec:'#a855f7', acc:'#fbbf24', glow:'rgba(255,110,199,0.35)' },
  { pri:'#60a5fa', sec:'#34d399', acc:'#fcd34d', glow:'rgba(96,165,250,0.35)'  },
  { pri:'#f97316', sec:'#ef4444', acc:'#fde68a', glow:'rgba(249,115,22,0.35)'  },
  { pri:'#a78bfa', sec:'#ec4899', acc:'#bef264', glow:'rgba(167,139,250,0.35)' },
  { pri:'#2dd4bf', sec:'#3b82f6', acc:'#f9a8d4', glow:'rgba(45,212,191,0.35)'  },
  { pri:'#fbbf24', sec:'#f472b6', acc:'#86efac', glow:'rgba(251,191,36,0.35)'  },
  { pri:'#fb7185', sec:'#c084fc', acc:'#67e8f9', glow:'rgba(251,113,133,0.35)' },
  { pri:'#4ade80', sec:'#facc15', acc:'#f0abfc', glow:'rgba(74,222,128,0.35)'  },
];

// ═══════════════════════════════════════════════════════════════════
// MAGICAL FOREST BACKGROUND (entirely code-drawn)
// ═══════════════════════════════════════════════════════════════════
const trees = [], bgParticles = [], orbs = [], mushrooms = [];

(function initForest() {
  // Pre-compute branch data for each tree
  function makeBranches(h, tw) {
    const count = 2 + Math.floor(h * 4);
    const branches = [];
    for (let b = 0; b < count; b++) {
      branches.push({
        yFrac: 0.4 + b * 0.15,
        side: b % 2 === 0 ? 1 : -1,
        lenMul: 3 + Math.random() * 4,
        widthMul: 0.3 * (1 - b * 0.15),
      });
    }
    return branches;
  }
  // Background trees (further away, smaller)
  for (let i = 0; i < 8; i++) { const h = 0.25+Math.random()*0.25; trees.push({
    x: i/8 + (Math.random()-0.5)*0.1, h,
    tw: 0.008 + Math.random()*0.012, layer: 0,
    hue: 100 + Math.random()*60, gp: Math.random()*6.28, gs: 0.3+Math.random()*0.4,
    branches: makeBranches(h, 0.01),
  });}
  // Foreground trees (closer, bigger, spread across width)
  for (let i = 0; i < 10; i++) { const h = 0.4+Math.random()*0.45; trees.push({
    x: i/10 + (Math.random()-0.5)*0.08, h,
    tw: 0.015 + Math.random()*0.025, layer: 1,
    hue: 80 + Math.random()*80, gp: Math.random()*6.28, gs: 0.2+Math.random()*0.5,
    branches: makeBranches(h, 0.02),
  });}
  // Sort so back-layer draws first
  trees.sort((a,b) => a.layer - b.layer);

  for (let i = 0; i < 70; i++) bgParticles.push({
    x:Math.random(), y:Math.random(), sz:1+Math.random()*3,
    sp:0.0002+Math.random()*0.0006, dr:Math.random()*6.28,
    hue:30+Math.random()*220, a:0.3+Math.random()*0.7, ph:Math.random()*6.28
  });
  for (let i = 0; i < 10; i++) orbs.push({
    x:Math.random(), y:0.25+Math.random()*0.65, r:10+Math.random()*25,
    dx:(Math.random()-0.5)*0.0004, dy:(Math.random()-0.5)*0.0003,
    hue:Math.random()*360, ph:Math.random()*6.28
  });
  // Glowing mushrooms on the ground
  for (let i = 0; i < 12; i++) mushrooms.push({
    x: Math.random(), y: 0.88 + Math.random()*0.1,
    sz: 0.01 + Math.random()*0.015,
    hue: Math.random() < 0.5 ? 280+Math.random()*40 : 160+Math.random()*40,
    ph: Math.random()*6.28
  });
})();

function drawTree(tx, bY, tH, tw, hue, gi, W, H, branches) {
  // ── Trunk with bark texture ──
  const trunkGrad = ctx.createLinearGradient(tx-tw, bY, tx+tw, bY);
  trunkGrad.addColorStop(0, '#1e0e06');
  trunkGrad.addColorStop(0.3, '#3d2010');
  trunkGrad.addColorStop(0.7, '#4a2814');
  trunkGrad.addColorStop(1, '#1e0e06');
  ctx.fillStyle = trunkGrad;
  ctx.beginPath();
  // Slightly curved trunk using bezier
  ctx.moveTo(tx - tw, bY);
  ctx.quadraticCurveTo(tx - tw*1.2, bY - tH*0.5, tx - tw*0.5, bY - tH);
  ctx.lineTo(tx + tw*0.5, bY - tH);
  ctx.quadraticCurveTo(tx + tw*1.2, bY - tH*0.5, tx + tw, bY);
  ctx.fill();

  // ── Branches (pre-computed, stable) ──
  ctx.strokeStyle = '#3a2010';
  ctx.lineCap = 'round';
  for (const br of branches) {
    const by = bY - tH * br.yFrac;
    const bLen = tw * br.lenMul;
    ctx.lineWidth = tw * br.widthMul;
    ctx.beginPath();
    ctx.moveTo(tx, by);
    ctx.quadraticCurveTo(tx + br.side*bLen*0.5, by - tH*0.05, tx + br.side*bLen, by - tH*0.08);
    ctx.stroke();
  }

  // ── Canopy: multiple overlapping leaf clusters ──
  const canopyTop = bY - tH;
  const canopyW = tw * 12;
  const canopyH = tH * 0.55;

  // Main canopy mass — several overlapping ellipses
  const clusters = [
    { dx: 0, dy: 0, rx: canopyW*0.5, ry: canopyH*0.45 },
    { dx: -canopyW*0.25, dy: canopyH*0.05, rx: canopyW*0.38, ry: canopyH*0.38 },
    { dx: canopyW*0.25, dy: canopyH*0.05, rx: canopyW*0.38, ry: canopyH*0.38 },
    { dx: -canopyW*0.1, dy: -canopyH*0.2, rx: canopyW*0.3, ry: canopyH*0.3 },
    { dx: canopyW*0.1, dy: -canopyH*0.2, rx: canopyW*0.3, ry: canopyH*0.3 },
    { dx: 0, dy: canopyH*0.15, rx: canopyW*0.45, ry: canopyH*0.3 },
  ];

  for (const cl of clusters) {
    const cx = tx + cl.dx, cy = canopyTop + cl.dy;
    // Dark base layer
    const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(cl.rx, cl.ry));
    cg.addColorStop(0, `hsla(${hue}, 50%, 22%, ${gi+0.4})`);
    cg.addColorStop(0.5, `hsla(${hue+10}, 45%, 16%, ${gi+0.25})`);
    cg.addColorStop(1, `hsla(${hue}, 40%, 10%, 0)`);
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.ellipse(cx, cy, cl.rx, cl.ry, 0, 0, 6.28);
    ctx.fill();
  }

  // Brighter glow layer on top for magical feel
  const glowGrad = ctx.createRadialGradient(tx, canopyTop, 0, tx, canopyTop, canopyW*0.5);
  glowGrad.addColorStop(0, `hsla(${hue+20}, 70%, 55%, ${gi*0.5})`);
  glowGrad.addColorStop(0.4, `hsla(${hue+10}, 60%, 40%, ${gi*0.3})`);
  glowGrad.addColorStop(1, `hsla(${hue}, 50%, 25%, 0)`);
  ctx.fillStyle = glowGrad;
  ctx.beginPath();
  ctx.ellipse(tx, canopyTop, canopyW*0.5, canopyH*0.45, 0, 0, 6.28);
  ctx.fill();

  // Leaf edge highlights — small bright spots around canopy perimeter
  for (let l = 0; l < 14; l++) {
    const angle = (l / 14) * 6.28 + gi * 0.5;
    const lr = canopyW * 0.4 + Math.sin(angle*3)*canopyW*0.08;
    const lx = tx + Math.cos(angle) * lr;
    const ly = canopyTop + Math.sin(angle) * canopyH * 0.35;
    const leafR = canopyW * 0.08 + Math.sin(angle*5+gi)*canopyW*0.03;
    ctx.fillStyle = `hsla(${hue + Math.sin(angle)*20}, 55%, 35%, ${0.3+gi*0.2})`;
    ctx.beginPath();
    ctx.arc(lx, ly, leafR, 0, 6.28);
    ctx.fill();
  }
}

function drawForest(t) {
  const W = canvas.width, H = canvas.height;

  // sky gradient — deep night forest
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#040214');
  sky.addColorStop(0.2,'#0e0628');
  sky.addColorStop(0.45,'#091a10');
  sky.addColorStop(0.7,'#071408');
  sky.addColorStop(1,'#050e05');
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);

  // Stars in the sky
  for (let i = 0; i < 30; i++) {
    const sx = (Math.sin(i*127.1) * 0.5 + 0.5) * W;
    const sy = (Math.sin(i*311.7) * 0.5 + 0.5) * H * 0.3;
    const fl = 0.3 + 0.7 * Math.abs(Math.sin(t*0.8 + i*2.3));
    ctx.fillStyle = `rgba(200,220,255,${fl*0.6})`;
    ctx.beginPath(); ctx.arc(sx, sy, 1+fl, 0, 6.28); ctx.fill();
  }

  // Ground — mossy forest floor
  const gnd = ctx.createLinearGradient(0, H*0.78, 0, H);
  gnd.addColorStop(0, 'rgba(10,30,12,0)');
  gnd.addColorStop(0.3, 'rgba(15,45,18,0.5)');
  gnd.addColorStop(0.6, 'rgba(12,35,15,0.8)');
  gnd.addColorStop(1, 'rgba(6,20,8,1)');
  ctx.fillStyle = gnd;
  ctx.fillRect(0, H*0.78, W, H*0.22);

  // Undergrowth — ferns/grass silhouettes along ground line
  ctx.fillStyle = 'rgba(15,50,20,0.6)';
  for (let i = 0; i < 40; i++) {
    const fx = (i/40) * W + Math.sin(i*7.7)*20;
    const fh = 15 + Math.sin(i*3.3)*10 + Math.sin(t*0.5+i)*3;
    const fy = H*0.82 + Math.sin(i*5.1)*8;
    // Simple fern triangle
    ctx.beginPath();
    ctx.moveTo(fx - 8, fy);
    ctx.lineTo(fx, fy - fh);
    ctx.lineTo(fx + 8, fy);
    ctx.fill();
  }

  // Draw trees
  for (const tr of trees) {
    const tx = tr.x * W, bY = H * 0.85, tH = tr.h * H, tw = tr.tw * W;
    const gi = 0.3 + 0.2 * Math.sin(t*tr.gs + tr.gp);
    drawTree(tx, bY, tH, tw, tr.hue, gi, W, H, tr.branches);
  }

  // Glowing mushrooms
  for (const m of mushrooms) {
    const mx = m.x*W, my = m.y*H, ms = m.sz*W;
    const gl = 0.5 + 0.3*Math.sin(t*1.5 + m.ph);
    // Stem
    ctx.fillStyle = `hsla(${m.hue},20%,60%,${gl*0.6})`;
    ctx.fillRect(mx - ms*0.15, my, ms*0.3, ms*1.2);
    // Cap
    ctx.beginPath();
    ctx.ellipse(mx, my, ms*0.7, ms*0.4, 0, Math.PI, 0);
    ctx.fillStyle = `hsla(${m.hue},60%,50%,${gl*0.8})`;
    ctx.fill();
    // Cap glow
    const mg = ctx.createRadialGradient(mx, my-ms*0.2, 0, mx, my-ms*0.2, ms*1.5);
    mg.addColorStop(0, `hsla(${m.hue},70%,65%,${gl*0.25})`);
    mg.addColorStop(1, 'hsla(0,0%,0%,0)');
    ctx.fillStyle = mg;
    ctx.beginPath(); ctx.arc(mx, my-ms*0.2, ms*1.5, 0, 6.28); ctx.fill();
  }

  // Ground mist — wispy fog near the bottom
  for (let i = 0; i < 6; i++) {
    const mx = (i/6)*W + Math.sin(t*0.2 + i*2.1)*W*0.05;
    const my = H*0.82 + Math.sin(i*1.7)*H*0.03;
    const mr = W*0.1 + Math.sin(t*0.3+i)*W*0.02;
    const mist = ctx.createRadialGradient(mx, my, 0, mx, my, mr);
    mist.addColorStop(0, `rgba(100,180,120,${0.06+0.03*Math.sin(t*0.5+i)})`);
    mist.addColorStop(1, 'rgba(50,100,60,0)');
    ctx.fillStyle = mist;
    ctx.beginPath(); ctx.arc(mx, my, mr, 0, 6.28); ctx.fill();
  }

  // Floating particles
  for (const p of bgParticles) {
    p.x += Math.sin(t*0.5+p.dr)*0.0003;
    p.y -= p.sp; if (p.y<-0.05){p.y=1.05;p.x=Math.random();}
    const fl = 0.4+0.6*Math.abs(Math.sin(t*2+p.ph));
    ctx.fillStyle = `hsla(${p.hue},80%,70%,${p.a*fl})`;
    ctx.beginPath(); ctx.arc(p.x*W,p.y*H,p.sz*fl,0,6.28); ctx.fill();
  }

  // Glowing orbs
  for (const o of orbs) {
    o.x+=o.dx; o.y+=o.dy;
    if(o.x<0||o.x>1)o.dx*=-1; if(o.y<0.15||o.y>0.95)o.dy*=-1;
    const pu=0.6+0.4*Math.sin(t*1.3+o.ph), r=o.r*pu;
    const og=ctx.createRadialGradient(o.x*W,o.y*H,0,o.x*W,o.y*H,r*2.5);
    og.addColorStop(0,`hsla(${o.hue},80%,80%,${0.5*pu})`);
    og.addColorStop(0.4,`hsla(${o.hue},70%,55%,${0.15*pu})`);
    og.addColorStop(1,'hsla(0,0%,0%,0)');
    ctx.fillStyle=og; ctx.beginPath(); ctx.arc(o.x*W,o.y*H,r*2.5,0,6.28); ctx.fill();
  }
}

// ═══════════════════════════════════════════════════════════════════
// BUTTERFLY WINGS (pure Canvas2D bezier curves + gradients)
// ═══════════════════════════════════════════════════════════════════
function drawWing(targetCtx, cx, cy, scale, flapAngle, pal, side, t) {
  targetCtx.save();
  targetCtx.translate(cx, cy);
  const fs = Math.cos(flapAngle);
  targetCtx.scale(side * fs, 1);
  const s = scale;

  // ── upper wing ──
  targetCtx.beginPath();
  targetCtx.moveTo(0, 0);
  targetCtx.bezierCurveTo(s*0.5, -s*0.9, s*1.3, -s*1.1, s*1.0, -s*0.35);
  targetCtx.bezierCurveTo(s*1.35, -s*0.55, s*1.45, -s*0.05, s*0.85, s*0.1);
  targetCtx.bezierCurveTo(s*0.45, s*0.08, s*0.15, 0.02, 0, 0);
  targetCtx.closePath();
  const ug = targetCtx.createRadialGradient(s*0.55,-s*0.35,0,s*0.55,-s*0.35,s*1.1);
  ug.addColorStop(0, pal.acc); ug.addColorStop(0.35, pal.pri);
  ug.addColorStop(0.75, pal.sec); ug.addColorStop(1,'rgba(0,0,0,0.25)');
  targetCtx.fillStyle = ug; targetCtx.globalAlpha = 0.88; targetCtx.fill();
  targetCtx.strokeStyle='rgba(255,255,255,0.3)'; targetCtx.lineWidth=1.5; targetCtx.stroke();

  // veins
  targetCtx.strokeStyle='rgba(255,255,255,0.18)'; targetCtx.lineWidth=1;
  targetCtx.beginPath(); targetCtx.moveTo(0,0); targetCtx.quadraticCurveTo(s*0.45,-s*0.55,s*0.95,-s*0.35); targetCtx.stroke();
  targetCtx.beginPath(); targetCtx.moveTo(0,0); targetCtx.quadraticCurveTo(s*0.3,-s*0.8,s*0.75,-s*0.7); targetCtx.stroke();
  targetCtx.beginPath(); targetCtx.moveTo(0,0); targetCtx.quadraticCurveTo(s*0.7,-s*0.3,s*1.1,-s*0.1); targetCtx.stroke();

  // eyespot
  const ex=s*0.65, ey=-s*0.45, er=s*0.13;
  const eg=targetCtx.createRadialGradient(ex,ey,0,ex,ey,er);
  eg.addColorStop(0,'#fff'); eg.addColorStop(0.25,pal.acc);
  eg.addColorStop(0.6,'rgba(0,0,0,0.5)'); eg.addColorStop(1,'rgba(0,0,0,0)');
  targetCtx.fillStyle=eg; targetCtx.globalAlpha=0.7;
  targetCtx.beginPath(); targetCtx.arc(ex,ey,er,0,6.28); targetCtx.fill();

  // second smaller eyespot
  const e2x=s*0.9, e2y=-s*0.15, e2r=s*0.07;
  const e2g=targetCtx.createRadialGradient(e2x,e2y,0,e2x,e2y,e2r);
  e2g.addColorStop(0,'#fff'); e2g.addColorStop(0.4,pal.pri);
  e2g.addColorStop(1,'rgba(0,0,0,0)');
  targetCtx.fillStyle=e2g; targetCtx.globalAlpha=0.5;
  targetCtx.beginPath(); targetCtx.arc(e2x,e2y,e2r,0,6.28); targetCtx.fill();

  // ── lower wing ──
  targetCtx.beginPath();
  targetCtx.moveTo(0, 0);
  targetCtx.bezierCurveTo(s*0.25, s*0.15, s*1.05, s*0.25, s*0.85, s*0.65);
  targetCtx.bezierCurveTo(s*0.95, s*0.9, s*0.5, s*1.0, s*0.2, s*0.75);
  targetCtx.bezierCurveTo(s*0.05, s*0.45, 0, s*0.1, 0, 0);
  targetCtx.closePath();
  const lg=targetCtx.createRadialGradient(s*0.45,s*0.5,0,s*0.45,s*0.5,s*0.85);
  lg.addColorStop(0,pal.pri); lg.addColorStop(0.5,pal.sec); lg.addColorStop(1,'rgba(0,0,0,0.25)');
  targetCtx.fillStyle=lg; targetCtx.globalAlpha=0.82; targetCtx.fill();
  targetCtx.strokeStyle='rgba(255,255,255,0.25)'; targetCtx.lineWidth=1.5; targetCtx.stroke();

  // lower veins
  targetCtx.strokeStyle='rgba(255,255,255,0.15)'; targetCtx.lineWidth=1;
  targetCtx.beginPath(); targetCtx.moveTo(0,0); targetCtx.quadraticCurveTo(s*0.3,s*0.4,s*0.65,s*0.7); targetCtx.stroke();
  targetCtx.beginPath(); targetCtx.moveTo(0,0); targetCtx.quadraticCurveTo(s*0.5,s*0.3,s*0.85,s*0.5); targetCtx.stroke();

  // scalloped edge dots
  for(let i=0;i<5;i++){
    const a=(i/5)*1.8+0.4, dx=s*0.5+Math.cos(a)*s*0.38, dy=s*0.55+Math.sin(a)*s*0.38;
    targetCtx.fillStyle=pal.acc; targetCtx.globalAlpha=0.35;
    targetCtx.beginPath(); targetCtx.arc(dx,dy,s*0.04,0,6.28); targetCtx.fill();
  }

  // trailing wing tip
  targetCtx.beginPath();
  targetCtx.moveTo(s*0.2, s*0.75);
  targetCtx.bezierCurveTo(s*0.15, s*1.05, s*0.35, s*1.1, s*0.4, s*0.85);
  targetCtx.fillStyle=pal.sec; targetCtx.globalAlpha=0.5; targetCtx.fill();

  targetCtx.globalAlpha = 1;
  targetCtx.restore();
}

// ═══════════════════════════════════════════════════════════════════
// SPARKLE EFFECTS
// ═══════════════════════════════════════════════════════════════════
const sparkleCache = new Map();
function getSparkles(id) {
  if (!sparkleCache.has(id)) {
    const arr = [];
    for (let i = 0; i < 24; i++) arr.push({
      ox:(Math.random()-0.5)*2.2, oy:(Math.random()-0.5)*2.2,
      sz:1+Math.random()*3, ph:Math.random()*6.28, sp:1.5+Math.random()*2.5
    });
    sparkleCache.set(id, arr);
  }
  return sparkleCache.get(id);
}

function drawSparkles(targetCtx, cx, cy, scale, pal, t, id) {
  const sps = getSparkles(id);
  for (const sp of sps) {
    const fl = 0.2+0.8*Math.abs(Math.sin(t*sp.sp+sp.ph));
    const sx = cx+sp.ox*scale, sy = cy+sp.oy*scale, r = sp.sz*fl;
    targetCtx.save();
    targetCtx.translate(sx, sy);
    targetCtx.rotate(t*1.5+sp.ph);
    targetCtx.fillStyle = `hsla(50,90%,85%,${fl*0.7})`;
    targetCtx.beginPath();
    for (let i=0;i<4;i++){
      const a=(i/4)*6.28;
      targetCtx.lineTo(Math.cos(a)*r*2.5, Math.sin(a)*r*2.5);
      targetCtx.lineTo(Math.cos(a+0.785)*r*0.5, Math.sin(a+0.785)*r*0.5);
    }
    targetCtx.closePath(); targetCtx.fill();
    targetCtx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════════
// POSE + SEGMENTATION STATE
// ═══════════════════════════════════════════════════════════════════
let poses = [];
let segmentationMask = null; // Float32Array from PoseLandmarker
let maskWidth = 0, maskHeight = 0;
const prevPositions = new Map();

// ═══════════════════════════════════════════════════════════════════
// LANDMARK SMOOTHING — exponential moving average to reduce jitter
// ═══════════════════════════════════════════════════════════════════
const SMOOTH = 0.35; // 0 = no smoothing, 1 = frozen. 0.35 = gentle smoothing
const smoothedPoses = [];

function smoothLandmarks(rawPoses) {
  // Grow/shrink smoothed array to match
  while (smoothedPoses.length < rawPoses.length) {
    smoothedPoses.push(null);
  }
  smoothedPoses.length = rawPoses.length;

  for (let i = 0; i < rawPoses.length; i++) {
    const raw = rawPoses[i];
    if (!smoothedPoses[i]) {
      // First frame for this pose — copy directly
      smoothedPoses[i] = raw.map(lm => ({ ...lm }));
      continue;
    }
    const prev = smoothedPoses[i];
    for (let j = 0; j < raw.length && j < prev.length; j++) {
      prev[j].x = prev[j].x * SMOOTH + raw[j].x * (1 - SMOOTH);
      prev[j].y = prev[j].y * SMOOTH + raw[j].y * (1 - SMOOTH);
      prev[j].z = prev[j].z * SMOOTH + raw[j].z * (1 - SMOOTH);
      prev[j].visibility = raw[j].visibility; // don't smooth visibility
    }
  }
  return smoothedPoses;
}

// ═══════════════════════════════════════════════════════════════════
// PERSON CUTOUT — uses segmentation mask to extract people from webcam
// ═══════════════════════════════════════════════════════════════════
function drawPersonCutout(W, H) {
  if (!segmentationMask || video.readyState < 2) return;

  const vw = video.videoWidth, vh = video.videoHeight;

  // Fit video to canvas dimensions (same math as before)
  const va = vw/vh, ca = W/H;
  let dw, dh, dx, dy;
  if (ca > va) { dw = W; dh = W/va; dx = 0; dy = (H-dh)/2; }
  else { dh = H; dw = H*va; dx = (W-dw)/2; dy = 0; }

  // 1) Draw the segmentation mask as alpha onto maskCanvas
  maskCanvas.width = maskWidth;
  maskCanvas.height = maskHeight;
  const maskImgData = maskCtx.createImageData(maskWidth, maskHeight);
  for (let i = 0; i < segmentationMask.length; i++) {
    const confidence = segmentationMask[i];
    // Mask value is confidence that pixel belongs to a person (0-1)
    const alpha = Math.min(255, Math.max(0, confidence * 255));
    maskImgData.data[i * 4]     = 255; // R
    maskImgData.data[i * 4 + 1] = 255; // G
    maskImgData.data[i * 4 + 2] = 255; // B
    maskImgData.data[i * 4 + 3] = alpha; // A — person confidence
  }
  maskCtx.putImageData(maskImgData, 0, 0);

  // 2) On personCanvas: draw webcam, then use mask to cut out only people
  personCanvas.width = W;
  personCanvas.height = H;
  personCtx.clearRect(0, 0, W, H);

  // Draw the mask scaled to canvas size (mirrored)
  personCtx.save();
  personCtx.translate(W, 0);
  personCtx.scale(-1, 1);
  personCtx.drawImage(maskCanvas, dx, dy, dw, dh);
  personCtx.restore();

  // 'source-in': only keep webcam pixels where mask alpha > 0
  personCtx.globalCompositeOperation = 'source-in';
  personCtx.save();
  personCtx.translate(W, 0);
  personCtx.scale(-1, 1);
  personCtx.drawImage(video, dx, dy, dw, dh);
  personCtx.restore();
  personCtx.globalCompositeOperation = 'source-over';

  // 3) Draw the cutout person onto the main canvas
  ctx.drawImage(personCanvas, 0, 0);
}

// ═══════════════════════════════════════════════════════════════════
// RENDER LOOP
// Layering order: Forest → Wings → Person cutout → Sparkles
// ═══════════════════════════════════════════════════════════════════
function render(ts) {
  const t = ts / 1000;
  const W = canvas.width, H = canvas.height;

  // ── Layer 1: Forest background ──
  drawForest(t);

  // ── Layer 2: Butterfly wings (behind people) ──
  for (let i = 0; i < poses.length; i++) {
    const lm = poses[i];
    const ls = lm[11], rs = lm[12]; // shoulders
    if (!ls || !rs || ls.visibility < 0.4 || rs.visibility < 0.4) continue;

    const pal = wingPalettes[i % wingPalettes.length];
    const lx = (1-ls.x)*W, ly = ls.y*H;
    const rx = (1-rs.x)*W, ry = rs.y*H;
    const cx = (lx+rx)/2, cy = (ly+ry)/2;
    const sDist = Math.hypot(rx-lx, ry-ly);
    const wScale = sDist * 1.15;

    // Motion → faster flap
    const key = `p${i}`;
    const prev = prevPositions.get(key);
    let motion = 0;
    if (prev) motion = Math.hypot(cx-prev.x, cy-prev.y);
    prevPositions.set(key, {x:cx, y:cy});
    const flapSpeed = 2.5 + Math.min(motion*0.06, 5);
    const flapAngle = Math.sin(t*flapSpeed + i*1.1) * 0.65;

    // Wing glow
    const gg = ctx.createRadialGradient(cx,cy,wScale*0.15,cx,cy,wScale*1.6);
    gg.addColorStop(0, pal.glow); gg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(cx,cy,wScale*1.6,0,6.28); ctx.fill();

    // Wings anchored to shoulders
    drawWing(ctx, rx, ry, wScale, flapAngle, pal, 1, t);
    drawWing(ctx, lx, ly, wScale, -flapAngle, pal, -1, t);
  }

  // ── Layer 3: Person cutout (in front of wings, no real background) ──
  drawPersonCutout(W, H);

  // ── Layer 4: Sparkles (in front of everything) ──
  for (let i = 0; i < poses.length; i++) {
    const lm = poses[i];
    const ls = lm[11], rs = lm[12];
    if (!ls || !rs || ls.visibility < 0.4 || rs.visibility < 0.4) continue;
    const pal = wingPalettes[i % wingPalettes.length];
    const lx = (1-ls.x)*W, ly = ls.y*H;
    const rx = (1-rs.x)*W, ry = rs.y*H;
    const cx = (lx+rx)/2, cy = (ly+ry)/2;
    const sDist = Math.hypot(rx-lx, ry-ly);
    const wScale = sDist * 1.15;
    drawSparkles(ctx, cx, cy, wScale, pal, t, i);
  }

  requestAnimationFrame(render);
}

// ═══════════════════════════════════════════════════════════════════
// INIT — MediaPipe Tasks Vision PoseLandmarker (multi-pose + segmentation)
// ═══════════════════════════════════════════════════════════════════
async function init() {
  const CDN = 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18';
  const MODEL = 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task';

  let poseLandmarker;
  // Try GPU first, fall back to CPU (known issue: GPU + segmentation can be blank)
  for (const delegate of ['GPU', 'CPU']) {
    try {
      const filesetResolver = await FilesetResolver.forVisionTasks(`${CDN}/wasm`);
      poseLandmarker = await PoseLandmarker.createFromOptions(filesetResolver, {
        baseOptions: { modelAssetPath: MODEL, delegate },
        runningMode: 'VIDEO',
        numPoses: 8,
        minPoseDetectionConfidence: 0.5,
        minPosePresenceConfidence: 0.5,
        minTrackingConfidence: 0.4,
        outputSegmentationMasks: true,
      });
      console.log(`PoseLandmarker created with ${delegate} delegate`);
      break;
    } catch(e) {
      console.warn(`${delegate} delegate failed:`, e);
      if (delegate === 'CPU') throw e; // both failed
    }
  }

  // Start webcam
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width:{ideal:1280}, height:{ideal:720}, facingMode:'user' },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
  } catch(err) {
    loadingEl.innerHTML = `<div style="color:#ff6b6b;text-align:center">
      <p>Kunde inte starta kameran.</p>
      <p style="font-size:16px;margin-top:10px">${err.message}</p>
      <p style="font-size:14px;margin-top:10px;color:#aaa">Se till att kameran är ansluten och tillåt åtkomst.</p></div>`;
    return;
  }

  loadingEl.style.display = 'none';
  requestAnimationFrame(render);

  // Detection loop
  let lastVideoTime = -1;
  function detect() {
    if (video.readyState >= 2 && video.currentTime !== lastVideoTime) {
      lastVideoTime = video.currentTime;
      const result = poseLandmarker.detectForVideo(video, performance.now());
      if (result) {
        if (result.landmarks) {
          poses = smoothLandmarks(result.landmarks);
        }
        // Get segmentation mask as Float32Array
        if (result.segmentationMasks && result.segmentationMasks.length > 0) {
          const mask = result.segmentationMasks[0];
          // getAsFloat32Array returns per-pixel confidence values (0-1)
          try {
            segmentationMask = mask.getAsFloat32Array();
            maskWidth = mask.width;
            maskHeight = mask.height;
          } catch(e) {
            // Some versions/delegates may not support this; fall back gracefully
          }
        }
      }
    }
    requestAnimationFrame(detect);
  }
  detect();
}

init();
</script>
</body>
