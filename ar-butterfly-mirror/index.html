<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fjärilsskogen - AR Butterfly Mirror</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  #mainCanvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  video { display: none; }
  #fullscreenBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 100;
    background: rgba(100, 50, 150, 0.7);
    color: #fff;
    border: 2px solid rgba(255, 255, 255, 0.4);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: background 0.3s;
  }
  #fullscreenBtn:hover { background: rgba(140, 70, 200, 0.9); cursor: pointer; }
  #title {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    color: #fff;
    font-size: clamp(20px, 4vw, 42px);
    font-weight: bold;
    text-shadow: 0 0 20px rgba(180,100,255,0.8), 0 0 40px rgba(100,200,255,0.5);
    pointer-events: none;
    white-space: nowrap;
    animation: titleGlow 3s ease-in-out infinite alternate;
  }
  @keyframes titleGlow {
    from { text-shadow: 0 0 20px rgba(180,100,255,0.8), 0 0 40px rgba(100,200,255,0.5); }
    to   { text-shadow: 0 0 30px rgba(220,140,255,1), 0 0 60px rgba(140,220,255,0.8), 0 0 80px rgba(255,180,255,0.4); }
  }
  #loading {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #1a0a2e; z-index: 200;
    color: #d4a0ff; font-size: 24px; gap: 20px;
  }
  .spinner {
    width: 60px; height: 60px;
    border: 4px solid rgba(180,100,255,0.3);
    border-top-color: #b060ff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div>Laddar Fjärilsskogen...</div>
</div>

<div id="title">&#x1F98B; Välkommen till Fjärilsskogen! &#x1F98B;</div>
<button id="fullscreenBtn" onclick="document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()">&#x26F6; Fullskärm</button>

<canvas id="mainCanvas"></canvas>
<video id="webcam" playsinline autoplay muted></video>

<script type="module">
const { PoseLandmarker, FilesetResolver } = await import(
  'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs'
);

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const video = document.getElementById('webcam');
const loadingEl = document.getElementById('loading');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

// ═══════════════════════════════════════════════════════════════════
// WING PALETTES — one per detected person
// ═══════════════════════════════════════════════════════════════════
const wingPalettes = [
  { pri:'#ff6ec7', sec:'#a855f7', acc:'#fbbf24', glow:'rgba(255,110,199,0.35)' },
  { pri:'#60a5fa', sec:'#34d399', acc:'#fcd34d', glow:'rgba(96,165,250,0.35)'  },
  { pri:'#f97316', sec:'#ef4444', acc:'#fde68a', glow:'rgba(249,115,22,0.35)'  },
  { pri:'#a78bfa', sec:'#ec4899', acc:'#bef264', glow:'rgba(167,139,250,0.35)' },
  { pri:'#2dd4bf', sec:'#3b82f6', acc:'#f9a8d4', glow:'rgba(45,212,191,0.35)'  },
  { pri:'#fbbf24', sec:'#f472b6', acc:'#86efac', glow:'rgba(251,191,36,0.35)'  },
  { pri:'#fb7185', sec:'#c084fc', acc:'#67e8f9', glow:'rgba(251,113,133,0.35)' },
  { pri:'#4ade80', sec:'#facc15', acc:'#f0abfc', glow:'rgba(74,222,128,0.35)'  },
];

// ═══════════════════════════════════════════════════════════════════
// MAGICAL FOREST BACKGROUND (entirely code-drawn)
// ═══════════════════════════════════════════════════════════════════
const trees = [], bgParticles = [], orbs = [];

(function initForest() {
  for (let i = 0; i < 14; i++) trees.push({
    x: Math.random(), h: 0.35 + Math.random()*0.55,
    tw: 0.015 + Math.random()*0.025, cr: 0.05 + Math.random()*0.09,
    hue: 90 + Math.random()*80, gp: Math.random()*6.28, gs: 0.3+Math.random()*0.5
  });
  for (let i = 0; i < 70; i++) bgParticles.push({
    x:Math.random(), y:Math.random(), sz:1+Math.random()*3,
    sp:0.0002+Math.random()*0.0006, dr:Math.random()*6.28,
    hue:30+Math.random()*220, a:0.3+Math.random()*0.7, ph:Math.random()*6.28
  });
  for (let i = 0; i < 10; i++) orbs.push({
    x:Math.random(), y:0.25+Math.random()*0.65, r:10+Math.random()*25,
    dx:(Math.random()-0.5)*0.0004, dy:(Math.random()-0.5)*0.0003,
    hue:Math.random()*360, ph:Math.random()*6.28
  });
})();

function drawForest(t) {
  const W = canvas.width, H = canvas.height;

  // sky
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#060318'); sky.addColorStop(0.25,'#140830');
  sky.addColorStop(0.55,'#0b2015'); sky.addColorStop(1,'#06140a');
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);

  // ground mist
  const gnd = ctx.createLinearGradient(0,H*0.8,0,H);
  gnd.addColorStop(0,'rgba(20,60,30,0)'); gnd.addColorStop(1,'rgba(8,30,14,0.7)');
  ctx.fillStyle = gnd; ctx.fillRect(0,H*0.8,W,H*0.2);

  // trees
  for (const tr of trees) {
    const tx = tr.x*W, bY = H, tH = tr.h*H, tw = tr.tw*W;
    // trunk
    ctx.fillStyle = '#3a2010';
    ctx.beginPath(); ctx.moveTo(tx-tw,bY); ctx.lineTo(tx-tw*0.6,bY-tH);
    ctx.lineTo(tx+tw*0.6,bY-tH); ctx.lineTo(tx+tw,bY); ctx.fill();
    // canopy glow
    const gi = 0.25+0.2*Math.sin(t*tr.gs+tr.gp);
    const cr = tr.cr*W, cy = bY-tH;
    const cg = ctx.createRadialGradient(tx,cy,cr*0.05,tx,cy,cr);
    cg.addColorStop(0,`hsla(${tr.hue},65%,50%,${gi+0.15})`);
    cg.addColorStop(0.6,`hsla(${tr.hue},55%,30%,${gi*0.6})`);
    cg.addColorStop(1,`hsla(${tr.hue},40%,20%,0)`);
    ctx.fillStyle = cg; ctx.beginPath(); ctx.arc(tx,cy,cr,0,6.28); ctx.fill();
  }

  // particles
  for (const p of bgParticles) {
    p.x += Math.sin(t*0.5+p.dr)*0.0003;
    p.y -= p.sp; if (p.y<-0.05){p.y=1.05;p.x=Math.random();}
    const fl = 0.4+0.6*Math.abs(Math.sin(t*2+p.ph));
    ctx.fillStyle = `hsla(${p.hue},80%,70%,${p.a*fl})`;
    ctx.beginPath(); ctx.arc(p.x*W,p.y*H,p.sz*fl,0,6.28); ctx.fill();
  }

  // orbs
  for (const o of orbs) {
    o.x+=o.dx; o.y+=o.dy;
    if(o.x<0||o.x>1)o.dx*=-1; if(o.y<0.15||o.y>0.95)o.dy*=-1;
    const pu=0.6+0.4*Math.sin(t*1.3+o.ph), r=o.r*pu;
    const og=ctx.createRadialGradient(o.x*W,o.y*H,0,o.x*W,o.y*H,r*2.5);
    og.addColorStop(0,`hsla(${o.hue},80%,80%,${0.5*pu})`);
    og.addColorStop(0.4,`hsla(${o.hue},70%,55%,${0.15*pu})`);
    og.addColorStop(1,'hsla(0,0%,0%,0)');
    ctx.fillStyle=og; ctx.beginPath(); ctx.arc(o.x*W,o.y*H,r*2.5,0,6.28); ctx.fill();
  }
}

// ═══════════════════════════════════════════════════════════════════
// BUTTERFLY WINGS (pure Canvas2D bezier curves + gradients)
// ═══════════════════════════════════════════════════════════════════
function drawWing(cx, cy, scale, flapAngle, pal, side, t) {
  ctx.save();
  ctx.translate(cx, cy);
  const fs = Math.cos(flapAngle);
  ctx.scale(side * fs, 1);
  const s = scale;

  // ── upper wing ──
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(s*0.5, -s*0.9, s*1.3, -s*1.1, s*1.0, -s*0.35);
  ctx.bezierCurveTo(s*1.35, -s*0.55, s*1.45, -s*0.05, s*0.85, s*0.1);
  ctx.bezierCurveTo(s*0.45, s*0.08, s*0.15, 0.02, 0, 0);
  ctx.closePath();
  const ug = ctx.createRadialGradient(s*0.55,-s*0.35,0,s*0.55,-s*0.35,s*1.1);
  ug.addColorStop(0, pal.acc); ug.addColorStop(0.35, pal.pri);
  ug.addColorStop(0.75, pal.sec); ug.addColorStop(1,'rgba(0,0,0,0.25)');
  ctx.fillStyle = ug; ctx.globalAlpha = 0.88; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1.5; ctx.stroke();

  // veins
  ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(s*0.45,-s*0.55,s*0.95,-s*0.35); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(s*0.3,-s*0.8,s*0.75,-s*0.7); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(s*0.7,-s*0.3,s*1.1,-s*0.1); ctx.stroke();

  // eyespot
  const ex=s*0.65, ey=-s*0.45, er=s*0.13;
  const eg=ctx.createRadialGradient(ex,ey,0,ex,ey,er);
  eg.addColorStop(0,'#fff'); eg.addColorStop(0.25,pal.acc);
  eg.addColorStop(0.6,'rgba(0,0,0,0.5)'); eg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=eg; ctx.globalAlpha=0.7;
  ctx.beginPath(); ctx.arc(ex,ey,er,0,6.28); ctx.fill();

  // second smaller eyespot
  const e2x=s*0.9, e2y=-s*0.15, e2r=s*0.07;
  const e2g=ctx.createRadialGradient(e2x,e2y,0,e2x,e2y,e2r);
  e2g.addColorStop(0,'#fff'); e2g.addColorStop(0.4,pal.pri);
  e2g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=e2g; ctx.globalAlpha=0.5;
  ctx.beginPath(); ctx.arc(e2x,e2y,e2r,0,6.28); ctx.fill();

  // ── lower wing ──
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(s*0.25, s*0.15, s*1.05, s*0.25, s*0.85, s*0.65);
  ctx.bezierCurveTo(s*0.95, s*0.9, s*0.5, s*1.0, s*0.2, s*0.75);
  ctx.bezierCurveTo(s*0.05, s*0.45, 0, s*0.1, 0, 0);
  ctx.closePath();
  const lg=ctx.createRadialGradient(s*0.45,s*0.5,0,s*0.45,s*0.5,s*0.85);
  lg.addColorStop(0,pal.pri); lg.addColorStop(0.5,pal.sec); lg.addColorStop(1,'rgba(0,0,0,0.25)');
  ctx.fillStyle=lg; ctx.globalAlpha=0.82; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1.5; ctx.stroke();

  // lower veins
  ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(s*0.3,s*0.4,s*0.65,s*0.7); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(s*0.5,s*0.3,s*0.85,s*0.5); ctx.stroke();

  // scalloped edge dots
  for(let i=0;i<5;i++){
    const a=(i/5)*1.8+0.4, dx=s*0.5+Math.cos(a)*s*0.38, dy=s*0.55+Math.sin(a)*s*0.38;
    ctx.fillStyle=pal.acc; ctx.globalAlpha=0.35;
    ctx.beginPath(); ctx.arc(dx,dy,s*0.04,0,6.28); ctx.fill();
  }

  // trailing wing tip (small decorative lobe)
  ctx.beginPath();
  ctx.moveTo(s*0.2, s*0.75);
  ctx.bezierCurveTo(s*0.15, s*1.05, s*0.35, s*1.1, s*0.4, s*0.85);
  ctx.fillStyle=pal.sec; ctx.globalAlpha=0.5; ctx.fill();

  ctx.globalAlpha = 1;
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════
// SPARKLE EFFECTS
// ═══════════════════════════════════════════════════════════════════
const sparkleCache = new Map();
function getSparkles(id) {
  if (!sparkleCache.has(id)) {
    const arr = [];
    for (let i = 0; i < 24; i++) arr.push({
      ox:(Math.random()-0.5)*2.2, oy:(Math.random()-0.5)*2.2,
      sz:1+Math.random()*3, ph:Math.random()*6.28, sp:1.5+Math.random()*2.5
    });
    sparkleCache.set(id, arr);
  }
  return sparkleCache.get(id);
}

function drawSparkles(cx, cy, scale, pal, t, id) {
  const sps = getSparkles(id);
  for (const sp of sps) {
    const fl = 0.2+0.8*Math.abs(Math.sin(t*sp.sp+sp.ph));
    const sx = cx+sp.ox*scale, sy = cy+sp.oy*scale, r = sp.sz*fl;
    // draw a 4-point star
    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(t*1.5+sp.ph);
    ctx.fillStyle = `hsla(50,90%,85%,${fl*0.7})`;
    ctx.beginPath();
    for (let i=0;i<4;i++){
      const a=(i/4)*6.28;
      ctx.lineTo(Math.cos(a)*r*2.5, Math.sin(a)*r*2.5);
      ctx.lineTo(Math.cos(a+0.785)*r*0.5, Math.sin(a+0.785)*r*0.5);
    }
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════════
// POSE STATE
// ═══════════════════════════════════════════════════════════════════
let poses = [];
const prevPositions = new Map();

// ═══════════════════════════════════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════════════════════════════════
function render(ts) {
  const t = ts / 1000;
  const W = canvas.width, H = canvas.height;

  // 1) Forest background
  drawForest(t);

  // 2) Webcam feed blended on top (mirrored for natural mirror)
  if (video.readyState >= 2) {
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.globalCompositeOperation = 'screen';
    ctx.translate(W, 0);
    ctx.scale(-1, 1);
    const vw=video.videoWidth, vh=video.videoHeight;
    const va=vw/vh, ca=W/H;
    let dw,dh,dx,dy;
    if(ca>va){dw=W;dh=W/va;dx=0;dy=(H-dh)/2;}
    else{dh=H;dw=H*va;dx=(W-dw)/2;dy=0;}
    ctx.drawImage(video, dx, dy, dw, dh);
    ctx.restore();
  }

  // 3) Overlay wings on each detected person
  for (let i = 0; i < poses.length; i++) {
    const lm = poses[i];
    // PoseLandmarker indices: 11=left shoulder, 12=right shoulder
    const ls = lm[11], rs = lm[12];
    if (!ls || !rs || ls.visibility < 0.4 || rs.visibility < 0.4) continue;

    const pal = wingPalettes[i % wingPalettes.length];

    // Convert normalised coords → canvas (mirrored X)
    const lx = (1-ls.x)*W, ly = ls.y*H;
    const rx = (1-rs.x)*W, ry = rs.y*H;
    const cx = (lx+rx)/2, cy = (ly+ry)/2;
    const sDist = Math.hypot(rx-lx, ry-ly);
    const wScale = sDist * 1.15;

    // Motion → faster flap
    const key = `p${i}`;
    const prev = prevPositions.get(key);
    let motion = 0;
    if (prev) motion = Math.hypot(cx-prev.x, cy-prev.y);
    prevPositions.set(key, {x:cx, y:cy});
    const flapSpeed = 2.5 + Math.min(motion*0.06, 5);
    const flapAngle = Math.sin(t*flapSpeed + i*1.1) * 0.65;

    // Glow
    const gg = ctx.createRadialGradient(cx,cy,wScale*0.15,cx,cy,wScale*1.6);
    gg.addColorStop(0, pal.glow); gg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(cx,cy,wScale*1.6,0,6.28); ctx.fill();

    // Wings anchored to each shoulder
    drawWing(rx, ry, wScale, flapAngle, pal, 1, t);
    drawWing(lx, ly, wScale, -flapAngle, pal, -1, t);

    // Sparkles
    drawSparkles(cx, cy, wScale, pal, t, i);
  }

  requestAnimationFrame(render);
}

// ═══════════════════════════════════════════════════════════════════
// INIT — MediaPipe Tasks Vision PoseLandmarker (multi-pose)
// ═══════════════════════════════════════════════════════════════════
async function init() {
  let poseLandmarker;
  try {
    const filesetResolver = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm'
    );
    poseLandmarker = await PoseLandmarker.createFromOptions(filesetResolver, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task',
        delegate: 'GPU',
      },
      runningMode: 'VIDEO',
      numPoses: 8,
      minPoseDetectionConfidence: 0.5,
      minPosePresenceConfidence: 0.5,
      minTrackingConfidence: 0.4,
    });
  } catch(e) {
    console.warn('GPU delegate failed, falling back to CPU', e);
    const filesetResolver = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm'
    );
    poseLandmarker = await PoseLandmarker.createFromOptions(filesetResolver, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task',
        delegate: 'CPU',
      },
      runningMode: 'VIDEO',
      numPoses: 8,
      minPoseDetectionConfidence: 0.5,
      minPosePresenceConfidence: 0.5,
      minTrackingConfidence: 0.4,
    });
  }

  // Start webcam
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width:{ideal:1280}, height:{ideal:720}, facingMode:'user' },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
  } catch(err) {
    loadingEl.innerHTML = `<div style="color:#ff6b6b;text-align:center">
      <p>Kunde inte starta kameran.</p>
      <p style="font-size:16px;margin-top:10px">${err.message}</p>
      <p style="font-size:14px;margin-top:10px;color:#aaa">Se till att kameran är ansluten och tillåt åtkomst.</p></div>`;
    return;
  }

  loadingEl.style.display = 'none';
  requestAnimationFrame(render);

  // Detection loop — runs at ~30fps independent of render
  let lastVideoTime = -1;
  function detect() {
    if (video.readyState >= 2 && video.currentTime !== lastVideoTime) {
      lastVideoTime = video.currentTime;
      const result = poseLandmarker.detectForVideo(video, performance.now());
      if (result && result.landmarks) {
        poses = result.landmarks;
      }
    }
    requestAnimationFrame(detect);
  }
  detect();
}

init();
</script>
</body>
</html>
