<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fjärilsmall - Kleurplaat</title>
<style>
  @page {
    size: A4 portrait;
    margin: 10mm;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #fff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  canvas {
    display: block;
    border: 3px solid #222;
  }
  @media print {
    body { background: none; }
    .no-print { display: none; }
  }
  .print-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #7c3aed;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 24px;
    font-size: 16px;
    cursor: pointer;
  }
  .print-btn:hover { background: #6d28d9; }
</style>
</head>
<body>

<button class="print-btn no-print" onclick="window.print()">Skriv ut</button>

<canvas id="template" width="680" height="960"></canvas>

<script>
const c = document.getElementById('template');
const ctx = c.getContext('2d');
const W = c.width, H = c.height;

// ── Title ──
ctx.fillStyle = '#333';
ctx.font = 'bold 28px sans-serif';
ctx.textAlign = 'center';
ctx.fillText('Måla din fjäril!', W/2, 40);
ctx.font = '14px sans-serif';
ctx.fillStyle = '#777';
ctx.fillText('Färglägg vingarna och håll upp teckningen framför kameran', W/2, 62);

// Center of butterfly — positioned in the middle of the page
const cx = W / 2;
const cy = H * 0.46;

// Wing scale — large enough to fill the page width
const s = 210;

ctx.strokeStyle = '#222';
ctx.lineWidth = 2.5;

// ── Body ──
ctx.lineWidth = 3;
ctx.beginPath();
ctx.ellipse(cx, cy, 10, 60, 0, 0, Math.PI * 2);
ctx.stroke();

// Head
ctx.beginPath();
ctx.arc(cx, cy - 66, 16, 0, Math.PI * 2);
ctx.stroke();

// Eyes
ctx.fillStyle = '#222';
ctx.beginPath(); ctx.arc(cx - 7, cy - 69, 3.5, 0, Math.PI * 2); ctx.fill();
ctx.beginPath(); ctx.arc(cx + 7, cy - 69, 3.5, 0, Math.PI * 2); ctx.fill();

// Smile
ctx.beginPath();
ctx.arc(cx, cy - 63, 7, 0.2, Math.PI - 0.2);
ctx.stroke();

// Antennae
ctx.lineWidth = 2;
ctx.beginPath();
ctx.moveTo(cx - 6, cy - 80);
ctx.quadraticCurveTo(cx - 55, cy - 140, cx - 70, cy - 130);
ctx.stroke();
ctx.beginPath();
ctx.arc(cx - 70, cy - 130, 5, 0, Math.PI * 2);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(cx + 6, cy - 80);
ctx.quadraticCurveTo(cx + 55, cy - 140, cx + 70, cy - 130);
ctx.stroke();
ctx.beginPath();
ctx.arc(cx + 70, cy - 130, 5, 0, Math.PI * 2);
ctx.stroke();

// ── Wings ──
ctx.lineWidth = 2.5;

function drawTemplateWings(side) {
  const dir = side;

  // Upper wing — same bezier as the AR version
  ctx.beginPath();
  ctx.moveTo(cx, cy - 18);
  ctx.bezierCurveTo(
    cx + dir * s * 0.5, cy - 18 - s * 0.9,
    cx + dir * s * 1.3, cy - 18 - s * 1.1,
    cx + dir * s * 1.0, cy - 18 - s * 0.35
  );
  ctx.bezierCurveTo(
    cx + dir * s * 1.35, cy - 18 - s * 0.55,
    cx + dir * s * 1.45, cy - 18 - s * 0.05,
    cx + dir * s * 0.85, cy - 18 + s * 0.1
  );
  ctx.bezierCurveTo(
    cx + dir * s * 0.45, cy - 18 + s * 0.08,
    cx + dir * s * 0.15, cy - 18 + 0.02,
    cx, cy - 18
  );
  ctx.closePath();
  ctx.stroke();

  // Upper wing veins
  ctx.save();
  ctx.lineWidth = 1;
  ctx.strokeStyle = '#bbb';
  ctx.setLineDash([5, 5]);
  ctx.beginPath();
  ctx.moveTo(cx, cy - 18);
  ctx.quadraticCurveTo(cx + dir * s * 0.45, cy - 18 - s * 0.55, cx + dir * s * 0.95, cy - 18 - s * 0.35);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx, cy - 18);
  ctx.quadraticCurveTo(cx + dir * s * 0.3, cy - 18 - s * 0.8, cx + dir * s * 0.75, cy - 18 - s * 0.7);
  ctx.stroke();
  ctx.restore();

  // Lower wing
  ctx.beginPath();
  ctx.moveTo(cx, cy + 6);
  ctx.bezierCurveTo(
    cx + dir * s * 0.25, cy + 6 + s * 0.15,
    cx + dir * s * 1.05, cy + 6 + s * 0.25,
    cx + dir * s * 0.85, cy + 6 + s * 0.65
  );
  ctx.bezierCurveTo(
    cx + dir * s * 0.95, cy + 6 + s * 0.9,
    cx + dir * s * 0.5, cy + 6 + s * 1.0,
    cx + dir * s * 0.2, cy + 6 + s * 0.75
  );
  ctx.bezierCurveTo(
    cx + dir * s * 0.05, cy + 6 + s * 0.45,
    cx, cy + 6 + s * 0.1,
    cx, cy + 6
  );
  ctx.closePath();
  ctx.stroke();

  // Lower wing vein
  ctx.save();
  ctx.lineWidth = 1;
  ctx.strokeStyle = '#bbb';
  ctx.setLineDash([5, 5]);
  ctx.beginPath();
  ctx.moveTo(cx, cy + 6);
  ctx.quadraticCurveTo(cx + dir * s * 0.3, cy + 6 + s * 0.4, cx + dir * s * 0.65, cy + 6 + s * 0.7);
  ctx.stroke();
  ctx.restore();
}

drawTemplateWings(1);
drawTemplateWings(-1);

// ── Color sample zone indicators ──
// These positions MUST match getSampleZones() in index.html
// We compute them as fractions of the full page, since the scanner
// detects the whole paper and uses fractional offsets from center.

// The 4 sample zones as fractions of page (from center):
// Upper wings: x=±0.28, y=-0.14  |  Lower wings: x=±0.22, y=+0.10
// (these match the getSampleZones function in index.html)

ctx.save();
ctx.strokeStyle = '#ccc';
ctx.lineWidth = 1.5;
ctx.setLineDash([3, 3]);

const sampleR = 20;
// Upper left
ctx.beginPath(); ctx.arc(cx - W*0.28, cy - H*0.14, sampleR, 0, Math.PI*2); ctx.stroke();
// Lower left
ctx.beginPath(); ctx.arc(cx - W*0.22, cy + H*0.10, sampleR, 0, Math.PI*2); ctx.stroke();
// Upper right
ctx.beginPath(); ctx.arc(cx + W*0.28, cy - H*0.14, sampleR, 0, Math.PI*2); ctx.stroke();
// Lower right
ctx.beginPath(); ctx.arc(cx + W*0.22, cy + H*0.10, sampleR, 0, Math.PI*2); ctx.stroke();

ctx.restore();

// ── Footer ──
ctx.fillStyle = '#aaa';
ctx.font = '12px sans-serif';
ctx.textAlign = 'center';
ctx.fillText('Fjärilsskogen', W/2, H - 15);
</script>
</body>
</html>
