<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fjärilsmall - Kleurplaat</title>
<style>
  @page {
    size: A4 portrait;
    margin: 15mm;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #fff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  .page {
    width: 190mm;
    height: 267mm;
    position: relative;
    border: 3px solid #222;
    padding: 10mm;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    font-size: 24pt;
    margin-bottom: 5mm;
    color: #333;
  }
  .instructions {
    font-size: 11pt;
    color: #666;
    text-align: center;
    margin-bottom: 8mm;
    line-height: 1.4;
  }
  canvas {
    display: block;
  }
  @media print {
    body { background: none; }
    .page { border: 3px solid #222; }
    .no-print { display: none; }
  }
  .print-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #7c3aed;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 24px;
    font-size: 16px;
    cursor: pointer;
  }
  .print-btn:hover { background: #6d28d9; }
</style>
</head>
<body>

<button class="print-btn no-print" onclick="window.print()">Skriv ut</button>

<div class="page">
  <h1>Måla din fjäril!</h1>
  <p class="instructions">
    Färglägg vingarna med kritor, pennor eller tuschpennor.<br>
    Håll sedan upp teckningen framför kameran för att skanna den.
  </p>
  <canvas id="template" width="640" height="750"></canvas>
</div>

<script>
const c = document.getElementById('template');
const ctx = c.getContext('2d');
const W = c.width, H = c.height;

// Center of butterfly
const cx = W / 2, cy = H * 0.42;

ctx.strokeStyle = '#222';
ctx.lineWidth = 2.5;
ctx.fillStyle = '#fff';

// ── Body ──
ctx.lineWidth = 3;
ctx.beginPath();
ctx.ellipse(cx, cy, 8, 50, 0, 0, Math.PI * 2);
ctx.stroke();

// Head
ctx.beginPath();
ctx.arc(cx, cy - 55, 14, 0, Math.PI * 2);
ctx.stroke();

// Eyes
ctx.fillStyle = '#222';
ctx.beginPath(); ctx.arc(cx - 6, cy - 58, 3, 0, Math.PI * 2); ctx.fill();
ctx.beginPath(); ctx.arc(cx + 6, cy - 58, 3, 0, Math.PI * 2); ctx.fill();

// Antennae
ctx.lineWidth = 2;
ctx.beginPath();
ctx.moveTo(cx - 5, cy - 67);
ctx.quadraticCurveTo(cx - 40, cy - 120, cx - 55, cy - 115);
ctx.stroke();
ctx.beginPath();
ctx.arc(cx - 55, cy - 115, 4, 0, Math.PI * 2);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(cx + 5, cy - 67);
ctx.quadraticCurveTo(cx + 40, cy - 120, cx + 55, cy - 115);
ctx.stroke();
ctx.beginPath();
ctx.arc(cx + 55, cy - 115, 4, 0, Math.PI * 2);
ctx.stroke();

// ── Wings — large, clear zones for coloring ──
ctx.lineWidth = 2.5;

// Scale for wing drawing
const s = 130;

function drawTemplateWings(side) {
  const dir = side; // 1 = right, -1 = left

  // Upper wing
  ctx.beginPath();
  ctx.moveTo(cx, cy - 15);
  ctx.bezierCurveTo(
    cx + dir * s * 0.5, cy - 15 - s * 0.9,
    cx + dir * s * 1.3, cy - 15 - s * 1.1,
    cx + dir * s * 1.0, cy - 15 - s * 0.35
  );
  ctx.bezierCurveTo(
    cx + dir * s * 1.35, cy - 15 - s * 0.55,
    cx + dir * s * 1.45, cy - 15 - s * 0.05,
    cx + dir * s * 0.85, cy - 15 + s * 0.1
  );
  ctx.bezierCurveTo(
    cx + dir * s * 0.45, cy - 15 + s * 0.08,
    cx + dir * s * 0.15, cy - 15 + 0.02,
    cx, cy - 15
  );
  ctx.closePath();
  ctx.stroke();

  // Upper wing vein lines (for decoration guidance)
  ctx.save();
  ctx.lineWidth = 1;
  ctx.strokeStyle = '#bbb';
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(cx, cy - 15);
  ctx.quadraticCurveTo(cx + dir * s * 0.45, cy - 15 - s * 0.55, cx + dir * s * 0.95, cy - 15 - s * 0.35);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx, cy - 15);
  ctx.quadraticCurveTo(cx + dir * s * 0.3, cy - 15 - s * 0.8, cx + dir * s * 0.75, cy - 15 - s * 0.7);
  ctx.stroke();
  ctx.restore();

  // Lower wing
  ctx.beginPath();
  ctx.moveTo(cx, cy + 5);
  ctx.bezierCurveTo(
    cx + dir * s * 0.25, cy + 5 + s * 0.15,
    cx + dir * s * 1.05, cy + 5 + s * 0.25,
    cx + dir * s * 0.85, cy + 5 + s * 0.65
  );
  ctx.bezierCurveTo(
    cx + dir * s * 0.95, cy + 5 + s * 0.9,
    cx + dir * s * 0.5, cy + 5 + s * 1.0,
    cx + dir * s * 0.2, cy + 5 + s * 0.75
  );
  ctx.bezierCurveTo(
    cx + dir * s * 0.05, cy + 5 + s * 0.45,
    cx, cy + 5 + s * 0.1,
    cx, cy + 5
  );
  ctx.closePath();
  ctx.stroke();

  // Lower wing vein
  ctx.save();
  ctx.lineWidth = 1;
  ctx.strokeStyle = '#bbb';
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(cx, cy + 5);
  ctx.quadraticCurveTo(cx + dir * s * 0.3, cy + 5 + s * 0.4, cx + dir * s * 0.65, cy + 5 + s * 0.7);
  ctx.stroke();
  ctx.restore();
}

drawTemplateWings(1);
drawTemplateWings(-1);

// ── Color sample zone indicators (subtle dotted circles) ──
ctx.save();
ctx.strokeStyle = '#ccc';
ctx.lineWidth = 1.5;
ctx.setLineDash([3, 3]);

// Upper left zone
ctx.beginPath();
ctx.arc(cx - s * 0.65, cy - 15 - s * 0.45, 18, 0, Math.PI * 2);
ctx.stroke();
// Lower left zone
ctx.beginPath();
ctx.arc(cx - s * 0.5, cy + 5 + s * 0.4, 18, 0, Math.PI * 2);
ctx.stroke();
// Upper right zone
ctx.beginPath();
ctx.arc(cx + s * 0.65, cy - 15 - s * 0.45, 18, 0, Math.PI * 2);
ctx.stroke();
// Lower right zone
ctx.beginPath();
ctx.arc(cx + s * 0.5, cy + 5 + s * 0.4, 18, 0, Math.PI * 2);
ctx.stroke();

ctx.restore();

// ── Footer text ──
ctx.fillStyle = '#999';
ctx.font = '13px sans-serif';
ctx.textAlign = 'center';
ctx.fillText('Färglägg vingarna och håll upp teckningen framför kameran!', W/2, H - 20);
</script>
</body>
</html>
